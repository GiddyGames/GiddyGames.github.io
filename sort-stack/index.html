        flick the finger is already lifting past the board/column edge
        by the time pointerup fires, so those coordinates land outside
        any .column element — elementFromPoint returns null, and the
        gesture was silently dropped ("released outside any column").
        Slow presses didn't hit this because the finger was still
        precisely over the target at release. Fix: added a document-level
        pointermove listener that continuously records lastHoverCol —
        the last column actually confirmed under the pointer during the
        current gesture. onGestureEnd now falls back to lastHoverCol
        whenever the literal release point misses every column, so a
        flick that visibly crossed a column still resolves correctly.
  v0.31 Fixed drags silently failing to register at all (repeated presses

        presses on col0 produced no move). Root cause: pointerup/
        pointercancel were bound directly on each .column element, but
        pointerdown's own render() call (for pressHighlight) rebuilds
        EVERY .column element mid-gesture — the element the pointerdown
        fired on gets destroyed and replaced with a fresh one that never
        received that pointerdown. The browser doesn't reliably hand the
        in-progress pointer off to the new element, so pointerup had
        nowhere to land — gesture just died with no error, no cancel, no
        log. Fix: pointerup/pointercancel are now bound ONCE at the
        document level instead of per-column, so it's irrelevant how many
        times columns get rebuilt mid-press. Also added logging at the
        top of onGestureEnd (which path: pointerup vs pointercancel, and
        which of the three possible outcomes — aborted/ignored/resolved)

        all, only pointerdown — that blind spot is why this took a second
        report to pin down.
  v0.32 Fixed the ACTUAL root cause behind v0.31's symptom (v0.31's

        which does columnsContainer.innerHTML = '' and rebuilds every
        column as a brand-new element — including the exact element the
        finger is still physically down on. On some mobile browsers, a
        sustained touch landing on a freshly-swapped DOM node at the same
        screen position gets treated as a NEW pointerdown on that node,
        even though the finger never lifted. That re-fire called render()
        again, creating another new node, which could re-fire again —
        a self-sustaining loop that ate the real gesture and starved
        pointerup entirely. Two-part fix: (1) pointerdown now ignores
        itself if a gesture is already pending (pendingGestureSource !==
        null), so even if the browser does re-fire, it's a no-op; (2)
        added updateHighlightsOnly(), which toggles the 'selected'
        className on the EXISTING column elements instead of rebuilding
        the DOM tree — pointerdown now calls this instead of render(), so
        the elements involved in an active gesture are never replaced out
        from under the pointer in the first place. render() is still used
        for anything that actually changes board state (moves, restarts).

        Added landing sounds, built fresh with raw Web Audio API —
        deliberately no Tone.js, no CDN, no external <script> tag at
        all, removing that entire risk class regardless of whether it
        was ever the real cause. Each block plays a short sine "plink"

        Pitch: within one move, every block pitches up 6 semitones
        (tritone, half of a 12-semitone octave) from the base 220Hz (A3),
        using the FIRST block to land as pitch index 0. Pitch index comes
        from `leadOrder` — each block's fixed, pre-computed position in
        the landing sequence — rather than a shared incrementing counter,
        so pitch stays correct even if landing callbacks fire slightly
        out of their "expected" order under frame drops. No explicit
        "reset" step needed: leadOrder is recalculated fresh at the start
        of every flyBlocksToColumn() call, so each new move's first
        landing is always pitch index 0 automatically.

        Sounds stack like one-shots, not a single shared voice: every
        playLandingSound() call creates its own independent
        oscillator+gain node pair, plays once, and is discarded. Nothing
        is shared or reused between calls, so up to N overlapping sounds
        (N = blocks in the stack, no hard cap) all ring out independently
        with zero risk of one call cutting another off — the exact "cut
        off" bug from the original Tone.js PolySynth attempt (shared
        voice pool with limited polyphony) can't happen here by
        construction, since there is no shared pool at all.

        AudioContext is created lazily on first real user input (inside
        the existing pointerdown handler, which already runs after
        startLevel() and all listeners are wired) rather than at script
        load — this both respects browser autoplay policy (which
        requires a user gesture before audio can play) and guarantees
        sound setup can never run before or instead of game setup.

        dissonant interval in Western music, harsh by definition) to a
        whole-tone step (2 semitones), so a 16-block run climbs a
        whole-tone scale (~2.67 octaves) instead of repeatedly hitting
        the harshest possible interval. Also gave the tone itself more
        body: was a single bare sine oscillator (can sound thin/buzzy at
        fast attack), now layers a full-volume fundamental with a quiet,
        faster-decaying octave-up partial on top — same one-shot,
        zero-shared-state approach as before (still no risk of notes
        cutting each other off), just a rounder, more bell-like color.
  v0.40 Added victory-screen jingle, played once when onWin() fires.
        Refactored the landing-sound's two-layer tone (fundamental +
        quiet octave shimmer) out into a standalone playTone(freq,
        startAtSec, durationSec) function, shared by both the landing
        plink and this jingle — one oscillator implementation, two call

        Pattern (your notation): B4 ~ B4 B4 A4 G4 A4 B4 A4 B4 ~ ~ B4 at
        140ms/beat — parses to B4 held 2 beats, then B4 B4 A4 G4 A4 B4 A4

        10 notes, 13 beats, ~1.82s total. `~` extends the PRECEDING
        note's held length by one beat, matching your notation exactly.

        Implementation: the whole pattern is parsed once into a flat
        list of {freq, startBeat, beats}, then every note is scheduled
        in a single pass via playTone's startAtSec offset — this is one
        batch of pre-scheduled Web Audio nodes fired together, NOT a
        step-by-step setTimeout loop, so the sequence can't be thrown
        off by frame drops or tab backgrounding once triggered. Each
        note plays for 85% of its held beat length (not the full 100%)
        so multi-beat notes still read as clearly "held" without
        completely smearing into whatever note comes right after.

        Added noteNameToFreq() for standard note-name → Hz conversion
        (equal temperament, A4=440Hz) so the pattern can be written in
        your musical notation directly rather than raw frequencies.

        overflow-y:auto (vertical scroll now available as a fallback
        instead of silently eating content), and #app changed from a
        fixed `height: 100%` to `min-height: 100%` so it can grow taller
        than the viewport when its content needs the room, rather than
        staying pinned at exactly viewport height and clipping.

        Also clarified BREATH_MS: earlier changed 800→1100 (+300ms per
        an earlier message), but the follow-up specified 700ms as the
        TOTAL wait, not an additional increment — set directly to 700,
        replacing both prior values rather than stacking on top of them.
  v0.48 Two changes:

        MUTE BUTTON RELOCATED: moved from #hud into #bottom-bar, stacked
        directly under Home on the left side (new #bottom-bar-left flex
        column wrapping both), Restart remains alone on the right.
        #hud now holds only the move counter. All JS references use
        getElementById, which doesn't care about DOM position, so no
        script changes were needed beyond the wiring already in place.

        RESPONSIVE AUTO-SCALING (desktop vs. phone): previously
        board-wrap/hud/bottom-bar all used a flat `min(92vw, 420px)` —
        reacts to viewport WIDTH only. Verified by calculation that a
        16-capacity, 6-column board at the 420px width cap works out to
        roughly 730px tall on its own (before title/hud/bottom-bar/gaps
        are even added) — on a short/wide desktop browser window this
        can exceed available vertical space even though there's ample
        horizontal room, since nothing was reading viewport HEIGHT at
        all. Replaced with a shared `--board-max-w` custom property:
        `min(92vw, 420px, max(50px, calc((92vh - 200px) / 1.75)))` — the
        third term reserves ~200px for the title/hud/bottom-bar/gaps/
        padding, converts the remaining vertical budget into an
        equivalent width using ~1.75 (the board's own measured height-
        to-width ratio at this capacity/column-count), and the whole
        thing is floored at 50px so a pathologically short viewport
        can't drive it negative. All three elements (#hud, #bottom-bar,
        #board-wrap) now reference var(--board-max-w) instead of
        duplicating the formula. Verified against 6 realistic viewport
        scenarios (phones portrait/landscape, laptop windows, large
        desktop, a deliberately extreme short window) before shipping —
        board width now shrinks in response to constrained height, not
        just constrained width, on every scenario tested. The existing
        preview-shrink debug toggle (`!important` override) is
        unaffected — important-flagged fixed values still win regardless
        of what the base width's source expression is.
  v0.49 Two changes:

        REMOVED preview-scaling system entirely, per request: the
        "Preview Rescale" debug button, its click handler, and the
        `body.preview-shrink` CSS override block are all gone. This was
        a manual dev toggle for shrinking the board to fit the in-chat
        preview window specifically — now superseded by v0.48's
        height-aware --board-max-w, which already handles constrained
        viewports automatically without needing a manual toggle.

        DOUBLED board size per feedback ("a bit tiny... double its
        size"). Left the 92vw term alone — on phones this is usually
        already the binding constraint (board already close to full
        screen width there), so scaling it wouldn't change anything on
        the devices most likely to be width-constrained. Doubled the two
        terms that actually control desktop/laptop sizing instead: the
        flat width cap 420px→840px, and the height-term's ratio divisor
        1.75→0.875 (a smaller divisor yields a larger result for the
        same leftover vertical space, so the board can now reach up to
        2x its previous width for the same amount of room). Re-verified
        against the same viewport scenarios as v0.48's original math:
        phones barely move (already width-bound), laptop/desktop windows
        get close to 2x the previous board size whenever space allows,
        and the extreme-short-viewport floor (50px) still holds — the
        height-aware formula means "double" can't reintroduce the
        vertical-overflow bug v0.47 fixed, since the height term still
        caps things down on any screen that's actually short on room.
  v0.50 Fixed mute button being covered by the fixed-position Debug
        button on mobile: #btn-debug-toggle sits at position:fixed;
        left:6px; bottom:6px — the exact bottom-left screen corner —
        which is right where v0.48's stacked #bottom-bar-left (Home on
        top, Mute directly under it) landed. Changed #bottom-bar-left
        from a vertical stack (flex-direction: column) to a horizontal
        row (flex-direction: row) — Mute now sits beside Home instead of
        underneath it, out from under the debug button's corner.
  v0.51 Rewrote board auto-scaling from scratch — the CSS-only
        --board-max-w formula (v0.48/v0.49) was still overflowing
        desktop windows per a screenshot report showing the board
        running well past the bottom edge. Root cause: that formula
        baked in a GUESSED height/width ratio (~1.75, later ~0.875) and
        a GUESSED flat pixel reservation (~200px) for the surrounding
        chrome, both estimated from a single measurement at the time
        they were written. Neither could self-correct — when the mute
        button moved into the bottom bar (v0.50) and the board was
        doubled (v0.49), the real chrome height and real board
        proportions both changed, but the hardcoded constants didn't,
        so the CSS quietly stopped matching reality.

        Replaced entirely with a JS-driven, MEASURED approach:
        updateBoardScale() reads the actual rendered offsetHeight of
        #game-title, #hud, and #bottom-bar, plus #app's real computed
        padding and gap values (getComputedStyle, not re-guessed
        numbers), to get the exact vertical space actually left for the
        board. widthForBoardHeight() then solves for the board width
        that produces EXACTLY that height, using the literal algebraic
        inverse of #board-wrap's real CSS geometry (same padding,
        column count, capacity, block aspect ratio, and gap constants
        the CSS itself uses) — not an approximated ratio. Verified this
        inverse function round-trips exactly (width→height→width, exact
        match) before wiring it in, then simulated it against 5
        viewport scenarios including a window sized to match the
        screenshot's reported overflow — every scenario now fits with
        zero overflow, by construction, since it's solving the real
        equation rather than approximating it.

        Sets the result as --board-max-w via inline style on #app
        (JS-set custom property, same variable name #hud/#bottom-bar/
        #board-wrap already consume, so no changes needed on their
        side). Runs once on load (before startLevel(), so the very
        first render already has correct sizing) and on every window
        resize, batched through requestAnimationFrame so rapid resize
        events during a window drag don't trigger redundant
        measurement/layout passes. Viewport WIDTH is still respected
        too (92vw cap) so a tall narrow phone can't get pushed wider
        than its own screen by the height-derived value; floor raised
        160px (was 50px) and ceiling kept at 840px, both independent
        safety bounds around the measured result.
  v0.52 Added +20% board scale-up per feedback (v0.51's exact-fit sizing
        read as a bit conservative in practice). This went through two
        iterations before shipping:

        First attempt multiplied the available-height BUDGET by 1.2
        before solving for width, then only re-clamped the resulting
        WIDTH against viewport-width caps — simulated this against the
        same test scenarios used to verify v0.51 and it overflowed on
        EVERY one of them, since multiplying an already-exact height
        budget by 1.2 doesn't create real screen space, and a
        width-only clamp was never checking for a height-based
        overflow. Caught this before shipping by testing it, not by
        inspection.

        Corrected approach: compute the exact-fit width first (this is
        the TRUE ceiling, zero margin), scale THAT width up by 1.2, then
        explicitly check the resulting height against the real
        available height — if scaling pushed it over, fall back to the
        exact-fit width instead. This required a NEW heightForBoardWidth()
        function (the forward direction: width→height, mirroring the
        real CSS) — width→height and height→width are close to but not
        exactly linearly proportional to each other (fixed padding
        offsets break exact proportionality, confirmed by testing), so
        checking the actual resulting height rather than assuming "1.2x
        width = 1.2x height" was necessary for correctness.

        Also: initially wrote heightForBoardWidth() as a call inside
        updateBoardScale() without having actually defined the function
        yet — would have thrown ReferenceError at runtime despite
        passing a plain syntax check (node --check validates syntax, not
        that every referenced function exists). Caught this specifically
        by extracting the REAL shipped code out of this file and
        executing it directly in Node (not a hand-copied reimplementation
        of it) before calling this done — that's what surfaced the
        missing function, and confirms the final shipped logic actually
        runs and produces the right numbers, not just that it parses.
  v0.53 Fixed the REAL bug behind "ironically unchanged in scale" — the
        v0.52 fallback check was self-defeating by construction, not
        just occasionally too conservative. trueAvailableHeight was
        defined as the absolute ceiling (100% of the real leftover
        space after chrome), and the scale-up was only kept if it still
        fit UNDER that same ceiling — but 1.2x a value can mathematically
        never be ≤ that same value, so the "does it still fit?" check
        failed on literally every call, on every screen, unconditionally.
        Not an edge case that slipped through simulation — a guaranteed-
        every-time failure that looked fine in v0.52's isolated logic
        tests only because those tests never happened to probe "does
        this ever grant the scale-up at all", just "does it overflow
        when it doesn't."

        Fix: removed the self-referential fit-check entirely. The +20%
        is now applied directly to the measured available height before
        solving for width — widthForBoardHeight(trueAvailableHeight *
        1.2) — with no attempt to re-validate against the unscaled
        ceiling, since that ceiling was the thing making growth
        impossible in the first place. This deliberately allows the
        board to extend past the exact chrome-reserved space on most
        real screens (window.innerHeight already excludes browser UI,
        and rendering has some natural slack); on a screen with truly
        zero slack, the overflow-y:auto safety net from v0.47 means
        worst case is a few px of scroll, not a broken layout — a far
        smaller risk than the guaranteed-no-op this replaces. Re-tested
        by extracting and executing the actual corrected code: the
        803.44-available/459px-exact-fit case now correctly produces
        ~543px (real growth, not a no-op), and a laptop-window scenario
        went from 261px to ~306px, both properly proportional to the
        requested +20% before viewport-width/ceiling clamps trim it.
*/

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: #1b1f27;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow-x: hidden;
  overflow-y: auto; /* was overflow: hidden (both axes) — with the title +
    bottom-bar added, total stacked content height can exceed shorter
    viewports; hidden-Y meant anything past the edge was silently
    invisible (not just clipped-but-scrollable), which is exactly what
    made the title and bottom bar vanish entirely on some screens while
    the vertically-centered board stayed visible. Allowing vertical
    scroll means worst case the player scrolls a few px — never a
    silently missing element again. */
  touch-action: manipulation;
}
#app {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100%; /* was height: 100% — a fixed height keeps #app pinned to
    exactly the viewport size even when its content (title + hud + board +
    bottom-bar, all with gaps) needs more room than that, which combined
    with centering pushed the top/bottom rows outside the visible area.
    min-height lets #app grow taller than the viewport when it needs to,
    with the new overflow-y:auto on body providing scroll access to
    whatever doesn't fit. */
  gap: 18px;
  padding: 16px;
  /* --board-max-w is set directly by JS (see updateBoardScale()), not
     computed here via a guessed height/width ratio and a guessed pixel
     reservation for surrounding chrome. The previous CSS-only version
     assumed a fixed ~1.75 height/width ratio and a flat ~200px chrome
     reservation — both were estimates from ONE measurement at the time
     they were written, and silently went stale the moment the
     surrounding layout changed (mute button moved into the bottom bar,
     board size was doubled) since nothing was re-deriving them from the
     real DOM. Falls back to 92vw here only for the instant before JS
     runs on first paint. */
  --board-max-w: min(92vw, 840px);
}
#game-title {
  color: #f2f4f8;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 1px;
  margin: 0;
}
#hud {
  display: flex; align-items: center; justify-content: center;
  width: var(--board-max-w);
  color: #cfd3dc;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
#bottom-bar {
  display: flex; align-items: flex-end; justify-content: space-between;
  width: var(--board-max-w);
}
#bottom-bar-left {
  display: flex; flex-direction: row; align-items: center;
  gap: 8px;
}
#btn-home {
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #645394;
  background: transparent;
  color: #645394;
  text-decoration: none;
  cursor: pointer;
}
#btn-home:active { background: rgba(100,83,148,0.15); }
#btn-mute {
  font-size: 16px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 8px;
  border: none;
  background: #3a8bff;
  color: white;
  cursor: pointer;
  line-height: 1;
}
#btn-mute.muted {
  background: #3a4152;
  color: #8b93a3;
}
#bottom-bar #btn-restart-hud {
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: #3a8bff;
  color: white;
  cursor: pointer;
}
#board-wrap {
  position: relative;
  width: var(--board-max-w);
  background: #262b36;
  border-radius: 16px;
  padding: 16px 10px;
}
#columns-container {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.column {
  flex: 1;
  display: flex;
  flex-direction: column-reverse;
  touch-action: none; /* prevent the browser from treating a sustained
    press-drag as a pan/scroll gesture, which was swallowing pointerup
    before it reached our code */
  gap: 2px;
  background: #1b1f27;
  border-radius: 8px;
  padding: 4px;
  min-height: 0;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.1s;
  cursor: pointer;
}
.column.selected {
  border-color: #fff;
  transform: translateY(-4px);
}
.block {
  width: 100%;
  aspect-ratio: 1.4 / 1;
  border-radius: 2px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 3px 0 rgba(255,255,255,0.15);
}
.block.empty-slot {
  background: transparent;
  box-shadow: none;
  border: none;
}
.block.flying {
  position: absolute;
  z-index: 150;
  pointer-events: none;
  top: 0;
  left: 0;
  will-change: transform;
  backface-visibility: hidden;
  transform-origin: bottom center;
}

/* Column-complete shine sweep: a diagonal (45°) white band that travels
   from the bottom of the completed column to the top, then disappears.
   Positioned as an absolutely-placed element on boardWrap (NOT inside
   the column itself) sized/clipped to exactly that column's live
   bounding rect — render() rebuilds every .column element on every move
   landing, so anything appended INSIDE a column would be destroyed
   mid-animation. boardWrap is never rebuilt, only appended to (same
   pattern the flying blocks already use), so this survives safely for
   its full duration regardless of what render() does elsewhere. */
.column-shine-clip {
  position: absolute;
  z-index: 160; /* above flying blocks (150), below UI overlays (300) */
  pointer-events: none;
  overflow: hidden; /* clips the diagonal band to exactly this column's rect */
  border-radius: 8px; /* match .column's rounding so the clip edge looks native */
}
.column-shine-band {
  position: absolute;
  /* wide + tall enough that a 45°-rotated band still fully covers the
     column's width at any point along its vertical travel, with margin
     to spare on both sides */
  width: 220%;
  height: 40px;
  left: -60%;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,1) 50%,
    rgba(255,255,255,0) 100%
  );
  transform: rotate(-45deg);
  transform-origin: center;
}

/* Throb: a single quick scale-pulse on the completed column's blocks,
   timed to start right as the shine reaches the top and disappears. */
@keyframes blockThrob {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}
.block.throb {
  animation: blockThrob 0.32s ease-out;
}

/* overlay (win screen) */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex; flex-direction:column; align-items:center; justify-content:center;

  font-size:34px;

}

/* debug button */
#btn-debug-toggle{
  position:fixed; left:6px; bottom:6px; z-index:300;
  font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:5px; border:1px solid #2a2a2a;
  background:transparent; color:#3a3a3a; cursor:pointer;
}
#btn-debug-toggle:active{ background:rgba(255,255,255,0.05); }

#debug-panel.show{ display:flex; }

  font-size:10px; font-weight:700; padding:3px 8px;
