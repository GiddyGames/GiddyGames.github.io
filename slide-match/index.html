  // quick bright beam from the gun to a target point, used for the kill presentation
  function spawnLaser(x1,y1,x2,y2,duration){
    const dx=x2-x1, dy=y2-y1;
    const dist = Math.hypot(dx,dy);
    const angle = Math.atan2(dy,dx) * 180/Math.PI;
    const beam = document.createElement('div');
    beam.style.position = 'absolute';
    beam.style.left = x1+'px';
    beam.style.top = y1+'px';
    beam.style.width = dist+'px';
    beam.style.height = '4.2px';
    beam.style.background = 'linear-gradient(90deg, #3a9bff, #d6f0ff)';
    beam.style.boxShadow = '0 0 10px 3px rgba(58,155,255,0.9)';
    beam.style.transformOrigin = '0 50%';
    beam.style.pointerEvents = 'none';
    beam.style.zIndex = '160';
    boardWrap.appendChild(beam);

    const anim = beam.animate([
      { transform:`rotate(${angle}deg) scaleX(0)`, opacity:1, offset:0 },
      { transform:`rotate(${angle}deg) scaleX(1)`, opacity:1, offset:0.4 },
      { transform:`rotate(${angle}deg) scaleX(1)`, opacity:1, offset:0.7 },
      { transform:`rotate(${angle}deg) scaleX(1)`, opacity:0, offset:1 }
    ], { duration: D(duration), easing:'ease-out' });
    return new Promise(resolve=>{ anim.onfinish = ()=>{ beam.remove(); resolve(); }; });
  }

  // finds whatever other tile of the same value is physically closest, ignoring
  // row/column alignment entirely — this is a forced kill, not a real match
  function findNearestSameTile(r,c,val){
    let best = null, bestDist = Infinity;
    for(let rr=0;rr<ROWS;rr++){
      for(let cc=0;cc<COLS;cc++){
        if(rr===r && cc===c) continue;
        if(board[rr][cc] !== val) continue;
        const dist = Math.hypot(rr-r, cc-c);
        if(dist < bestDist){ bestDist = dist; best = {r:rr,c:cc}; }
      }
    }
    return best;
  }

  // debug only: instantly clears ~90% of whatever's left on the board, in
  // matching pairs (regardless of alignment), so you can quickly get to an
  // end-of-level state without actually playing it out
  function debugSolve(){
    if(animating) return;
    const cells = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]!=null) cells.push({r,c,val:board[r][c]});
    const targetRemovals = Math.floor(cells.length * 0.9 / 2) * 2;
    shuffle(cells);
    const byVal = {};
    cells.forEach(cell=>{ (byVal[cell.val] = byVal[cell.val] || []).push(cell); });

    let removed = 0;
    for(const val in byVal){
      const list = byVal[val];
      while(list.length >= 2 && removed < targetRemovals){
        const a = list.pop(), b = list.pop();
        const elA = tileMap[a.r+','+a.c], elB = tileMap[b.r+','+b.c];
        if(elA) elA.remove();
        if(elB) elB.remove();
        delete tileMap[a.r+','+a.c]; delete tileMap[b.r+','+b.c];
        board[a.r][a.c] = null; board[b.r][b.c] = null;
        remaining -= 2;
        removed += 2;
      }
      if(removed >= targetRemovals) break;
    }
    logMove(`DEBUG SOLVE: removed ${removed} tiles`);
    checkWin();
  }

  function fireTileKiller(r,c){
    const val = board[r][c];
    if(val==null) return;
    const partner = findNearestSameTile(r,c,val);
    killerArmed = false;
    clearKillerHighlights();
    if(!partner){ renderDiffuser(); return; } // nothing to pair with, charge not spent
    // note: renderDiffuser() deliberately NOT called here yet — button keeps
    // showing "armed" visually until the sequence + 0.8s grace has passed

    const gunRect = document.getElementById('btn-diffuser').getBoundingClientRect();
    const wrapRect = boardWrap.getBoundingClientRect();
    const gunX = gunRect.left + gunRect.width/2 - wrapRect.left;
    const gunY = gunRect.top + gunRect.height/2 - wrapRect.top;

    const elA = tileMap[r+','+c];
    const rectA = elA.getBoundingClientRect();
    const ax = rectA.left + rectA.width/2 - wrapRect.left, ay = rectA.top + rectA.height/2 - wrapRect.top;

    const elB = tileMap[partner.r+','+partner.c];
    const rectB = elB.getBoundingClientRect();
    const bx = rectB.left + rectB.width/2 - wrapRect.left, by = rectB.top + rectB.height/2 - wrapRect.top;

    animating = true; animatingSince = Date.now();

    spawnLaser(gunX, gunY, ax, ay, 200).then(()=>{
      violentWiggle(elA);
      setTimeout(()=>{
        spawnLaser(gunX, gunY, bx, by, 200).then(()=>{
          violentWiggle(elB);
          diffusersAvailable--;
          logMove(`Tile Killer fired on (${r},${c})=${val}, nearest match (${partner.r},${partner.c}) (${diffusersAvailable} left)`);
          doMatch(r, c, r, c, partner.r, partner.c);
          setTimeout(renderDiffuser, 800);
        });
      }, 200);
    });
  }

  function renderLives(){
    livesEl.innerHTML = '';
    for(let i=0;i<5;i++){
      const s = document.createElement('span');
      s.textContent = '♥';
      if(i >= lives) s.classList.add('lost');
      livesEl.appendChild(s);
    }
  }

  // (re)creates tile elements to match whatever is currently in the board array
  function renderTiles(){
    Object.values(tileMap).forEach(el => el.remove());
    tileMap = {};
    remaining = 0;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(board[r][c]!=null){
          remaining++;
          createTile(r,c,board[r][c]);
        }
      }
    }
  }

  function buildBoard(){
    gridEl.innerHTML = '';
    tileMap = {};
    cellMap = {};
    board = Array.from({length:ROWS}, ()=> Array(COLS).fill(null));

    // background cells, also used as fixed reference points for drag distance
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cell = document.createElement('div');
        cell.className='cell';
        cell.style.gridRowStart = r+1;
        cell.style.gridColumnStart = c+1;
        gridEl.appendChild(cell);
        cellMap[r+','+c] = cell;
      }
    }

    // build values: 10 numbers x 4 copies = 40 tiles, 8 empty cells (48 total)
    let values = [];
    for(let n=1;n<=10;n++){ for(let k=0;k<4;k++) values.push(n); }
    while(values.length < ROWS*COLS) values.push(null); // pad with empties
    shuffle(values);

    let idx=0;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        board[r][c] = values[idx++];
      }
    }
    const isHardMode = (level % 4 === 0);
    if(isHardMode){ convertToBombs(); showHardLevelBanner(); }
    document.getElementById('hard-mode-hint').classList.toggle('show', isHardMode);
    renderTiles();
  }

  // picks a random number that has 4 copies on the board and turns 2 of them into
  // bombs (leaving the other 2 as a normal pair, so total counts stay even/solvable)
  let bombStartCount = 6;

  // recomputes bombStartCount from wherever the bombs currently sit — call this
  // before renderTiles() any time positions change (shuffle, auto-reshuffle),
  // otherwise createTile falls back to whatever stale value was set at level start
  function recalcBombStartCount(){
    const bombCells = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]==='bomb') bombCells.push({r,c});
    if(bombCells.length < 2) return;
    const [a,b] = bombCells;
    bombStartCount = estimateBombCountdown(a.r,a.c,b.r,b.c);
  }

  function convertToBombs(){
    const targetNum = 1 + Math.floor(Math.random()*10);
    const positions = [];
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(board[r][c] === targetNum) positions.push({r,c});
      }
    }
    shuffle(positions);
    if(positions.length < 2) return;
    const [a, b] = positions;
    board[a.r][a.c] = 'bomb';
    board[b.r][b.c] = 'bomb';
    bombStartCount = estimateBombCountdown(a.r, a.c, b.r, b.c);
  }

  // counts non-empty tiles strictly between two points along one straight row/column run
  function countObstaclesBetween(r1,c1,r2,c2){
    let n = 0;
    if(r1 === r2){
      const cmin=Math.min(c1,c2), cmax=Math.max(c1,c2);
      for(let c=cmin+1;c<cmax;c++) if(board[r1][c]!=null) n++;
    } else if(c1 === c2){
      const rmin=Math.min(r1,r2), rmax=Math.max(r1,r2);
      for(let r=rmin+1;r<rmax;r++) if(board[r][c1]!=null) n++;
    }
    return n;
  }

  // heuristic only — not a real solver. If the bombs already share a row/column,
  // just count what's directly between them. Otherwise estimate via the cheaper
  // of the two possible L-shaped routes. Plus one grace move, per request.
  function estimateBombCountdown(r1,c1,r2,c2){
    let obstacles;
    if(r1 === r2 || c1 === c2){
      obstacles = countObstaclesBetween(r1,c1,r2,c2);
    } else {
      const viaRow1 = countObstaclesBetween(r1,c1,r1,c2) + countObstaclesBetween(r1,c2,r2,c2);
      const viaCol1 = countObstaclesBetween(r1,c1,r2,c1) + countObstaclesBetween(r2,c1,r2,c2);
      obstacles = Math.min(viaRow1, viaCol1);
    }
    return obstacles + 5; // grace moves
  }

  // reshuffles just the tiles still on the board, keeping their cells fixed
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
  }

  function createTile(r,c,val){
    const el = document.createElement('div');
    el.className='tile';
    if(val === 'bomb'){
      el.classList.add('bomb-tile');
      el.dataset.bombCount = bombStartCount;
      el.style.background = '#3a3a3a';
      el.style.color = '#fff';
      const numberSpan = document.createElement('span');
      numberSpan.className = 'bomb-number';
      numberSpan.style.color = '#ff3b3b';
      numberSpan.textContent = bombStartCount;
      el.appendChild(numberSpan);
      const wick = document.createElement('div');
      wick.className = 'bomb-wick';
      el.appendChild(wick);
      const spark = document.createElement('div');
      spark.className = 'bomb-spark';
      spark.textContent = '*';
      el.appendChild(spark);
    } else {
      el.textContent = val;
      el.style.background = PALETTE[val];
      el.style.color = (val===4) ? 'rgba(34,34,34,0.5)' : 'rgba(255,255,255,0.5)';
    }
    el.style.gridRowStart = r+1;
    el.style.gridColumnStart = c+1;
    el.dataset.row = r;
    el.dataset.col = c;
    attachDrag(el);
    gridEl.appendChild(el);
    tileMap[r+','+c] = el;
    return el;
  }

  // finds every empty cell reachable from an already-empty starting cell, and what's beyond it
  function scanEmptyRun(startR,startC,dirName){
    const [dr,dc] = DIRS[dirName];
    let lastR=startR, lastC=startC, cr=startR, cc=startC, obstruction=null;
    while(true){
      const nr=cr+dr, nc=cc+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) break;
      if(board[nr][nc]==null){ lastR=nr; lastC=nc; cr=nr; cc=nc; continue; }
      obstruction = {r:nr, c:nc, val:board[nr][nc]};
      break;
    }
    return {lastR, lastC, obstruction};
  }

  // from a grabbed cell, collects every jammed (non-empty) tile between it and the
  // leading edge in dirName; if that edge butts straight against the wall with no
  // gap ever found, the whole thing is stuck. Otherwise reports where the leading
  // tile can rest and what it would run into.
  function getPushChain(r,c,dirName){
    const [dr,dc] = DIRS[dirName];
    const chain = [{r,c}];
    let cr=r, cc=c;
    while(true){
      const nr=cr+dr, nc=cc+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return { chain, blocked:true };
      if(board[nr][nc]==null){
        const run = scanEmptyRun(nr,nc,dirName);
        return { chain, blocked:false, restR:run.lastR, restC:run.lastC, obstruction:run.obstruction };
      }
      chain.push({r:nr,c:nc});
      cr=nr; cc=nc;
    }
  }

  function perpDirs(dirName){
    return (dirName==='left'||dirName==='right') ? ['up','down'] : ['left','right'];
  }

  function findPerpMatch(r,c,val,dirName){
    for(const d of perpDirs(dirName)){
      const [dr,dc] = DIRS[d];
      let nr=r+dr, nc=c+dc;
      while(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]==null){ nr+=dr; nc+=dc; }
      if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===val) return {r:nr, c:nc};
    }
    return null;
  }

  // permanently applies the shift for a chain of tiles; if skipCell is given (the lead
  // tile in a match), that one is left for doMatch to clean up instead
  function finalizeChainShift(chain, dr, dc, shiftCells, skipCell){
    const isSkip = (cell)=> skipCell && cell.r===skipCell.r && cell.c===skipCell.c;

    // capture everything up front, before any key gets deleted or overwritten
    const entries = chain.filter(cell=>!isSkip(cell)).map(cell => ({
      cell,
      el: tileMap[cell.r+','+cell.c],
      val: board[cell.r][cell.c],
      newR: cell.r+dr*shiftCells,
      newC: cell.c+dc*shiftCells
    }));

    chain.forEach(cell => { board[cell.r][cell.c] = null; });
    entries.forEach(({cell})=>{ delete tileMap[cell.r+','+cell.c]; });
    entries.forEach(({cell, el, val, newR, newC})=>{
      if(!el){ logMove(`WARN: finalizeChainShift found no tile at (${cell.r},${cell.c})`); return; }
      tileMap[newR+','+newC] = el;
      el.dataset.row = newR; el.dataset.col = newC;
      board[newR][newC] = val;
      logMove(`  shift (${cell.r},${cell.c})=${val} -> (${newR},${newC})`);
    });
  }

  function wiggleChain(els, duration=300){ return Promise.all(els.map(e=>wiggle(e, duration))); }

  // pulls a whole mismatched chain back home using known pixel offsets (no re-measuring
  // mid-flight, which is where the multi-tile revert was going wrong)
  function revertChainToOrigin(chain, axis, dir, maxPx, duration){
    const sign = (dir==='right'||dir==='down') ? 1 : -1;
    const prop = axis==='x' ? 'translateX' : 'translateY';
    const els = chain.map(cell => tileMap[cell.r+','+cell.c]);
    return Promise.all(els.map(el2 => new Promise((resolve)=>{
      const anim = el2.animate([
        { transform:`${prop}(0px)` },
        { transform:`${prop}(${-sign*maxPx}px)` }
      ], { duration: D(duration), easing:'ease-out', fill:'forwards' });
      anim.onfinish = ()=>{ anim.cancel(); resolve(); };
    }))).then(()=>{
      chain.forEach(cell=>{
        const elx = tileMap[cell.r+','+cell.c];
        elx.style.gridRowStart = cell.r+1;
        elx.style.gridColumnStart = cell.c+1;
        elx.style.transform = '';
      });
    });
  }

  // tile (and, if jammed against neighbors, its whole block) follows the finger live,
  // clamped to how far the block can actually travel
  function attachDrag(el){
    let active=false, axisLocked=null, dirName=null, committed=false;
    let startX=0, startY=0, dragR=0, dragC=0;
    let dragChain=null, dragLeadCell=null, dragMatchCell=null, dragShiftCells=0;
    let dragLastR=0, dragLastC=0, dragObstruction=null, dragCrossPartner=null, maxPx=0, committedPx=0;

    el.addEventListener('pointerdown', (e)=>{
      if(animating) return;
      active = true;
      committed = false;
      axisLocked = null;
      committedPx = 0;
      startX = e.clientX; startY = e.clientY;
      dragR = parseInt(el.dataset.row); dragC = parseInt(el.dataset.col);
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener('pointermove', (e)=>{
      if(!active || committed) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if(axisLocked===null){
        if(Math.max(Math.abs(dx),Math.abs(dy)) < 8) return;
        axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        dirName = axisLocked==='x' ? (dx>0?'right':'left') : (dy>0?'down':'up');

        // dragging straight into an adjacent tile of the same value = the player
        // explicitly picking THAT one as the match, in a cluster of candidates
        const [ndr,ndc] = DIRS[dirName];
        const nr = dragR+ndr, nc = dragC+ndc;
        if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===board[dragR][dragC]){
          committed = true;
          active = false;
          safeSetTransform(dragR, dragC, '');
          doMatch(dragR, dragC, dragR, dragC, nr, nc);
          return;
        }

        const pc = getPushChain(dragR,dragC,dirName);
        dragChain = pc.chain;
        dragLeadCell = pc.chain[pc.chain.length-1];

        if(pc.blocked){
          dragLastR = dragR; dragLastC = dragC;
          dragObstruction = null; dragCrossPartner = null; dragMatchCell = null;
          dragShiftCells = 0; maxPx = 0;
        } else {
          const [sdr,sdc] = DIRS[dirName];
          const maxShift = axisLocked==='x' ? Math.abs(pc.restC-dragLeadCell.c) : Math.abs(pc.restR-dragLeadCell.r);

          // check every tile in the pushed block, not just the lead, at each step of travel
          let foundStep=null, foundPartner=null, foundCell=null;
          for(let step=1; step<=maxShift && foundStep===null; step++){
            for(const cell of dragChain){
              const pr = cell.r+sdr*step, pcv = cell.c+sdc*step;
              const val = board[cell.r][cell.c];
              const p = findPerpMatch(pr, pcv, val, dirName);
              if(p){ foundStep=step; foundPartner=p; foundCell=cell; break; }
            }
          }

          if(foundStep!==null){
            dragShiftCells = foundStep;
            dragMatchCell = foundCell;
            dragCrossPartner = foundPartner;
            dragObstruction = null;
          } else {
            dragShiftCells = maxShift;
            dragMatchCell = dragLeadCell;
            dragCrossPartner = null;
            dragObstruction = pc.obstruction;
          }

          dragLastR = dragLeadCell.r + sdr*dragShiftCells;
          dragLastC = dragLeadCell.c + sdc*dragShiftCells;

          const originRect = cellMap[dragLeadCell.r+','+dragLeadCell.c].getBoundingClientRect();
          const destRect = cellMap[dragLastR+','+dragLastC].getBoundingClientRect();
          maxPx = axisLocked==='x' ? Math.abs(destRect.left-originRect.left) : Math.abs(destRect.top-originRect.top);
        }
      }
      const raw = axisLocked==='x' ? dx : dy;
      const signedTowardTarget = (dirName==='right'||dirName==='down') ? raw : -raw;
      committedPx = Math.max(0, Math.min(maxPx, signedTowardTarget));
      const px = (dirName==='right'||dirName==='down') ? committedPx : -committedPx;
      const transformStr = axisLocked==='x' ? `translateX(${px}px)` : `translateY(${px}px)`;
      dragChain.forEach(cell=> safeSetTransform(cell.r, cell.c, transformStr));

      // if the drag has reached a genuine match, commit right now instead of
      // waiting for the finger to lift
      if(maxPx>0 && committedPx>=maxPx && dragMatchCell){
        const matchVal = board[dragMatchCell.r][dragMatchCell.c];
        const isMatch = dragCrossPartner || (dragObstruction && dragObstruction.val===matchVal);
        if(isMatch){
          committed = true;
          active = false;
          commitDrag();
        }
      }
    });

    el.addEventListener('pointerup', ()=>{
      if(!active) return;
      active = false;
      if(committed) return; // already handled mid-drag

      if(axisLocked===null){
        attemptTap(dragR,dragC);
        return;
      }
      commitDrag();
    });

    function commitDrag(){
      if(maxPx===0 && !dragObstruction && !dragCrossPartner){
        dragChain.forEach(cell=> safeSetTransform(cell.r, cell.c, ''));
        logMove(`push (${dragR},${dragC}) dir=${dirName} chain=${dragChain.length} -> blocked, no room`);
        return;
      }
      if(committedPx < maxPx * 0.15){
        dragChain.forEach(cell=> safeSetTransform(cell.r, cell.c, ''));
        logMove(`push (${dragR},${dragC}) dir=${dirName} -> cancelled (dragged back near start)`);
        return;
      }
      setAnimating(true);
      const els = dragChain.map(cell=> tileMap[cell.r+','+cell.c]);
      const [dr,dc] = DIRS[dirName];
      const shiftCells = dragShiftCells;
      const logPrefix = `push (${dragR},${dragC}) dir=${dirName} chain=${dragChain.length} shift=${shiftCells}`;

      Promise.all(els.map(e2 => snapToFull(e2, axisLocked, dirName, committedPx, maxPx, 120))).then(()=>{
        try{
          dragChain.forEach(cell=>{
            const elx = tileMap[cell.r+','+cell.c];
            if(!elx){ logMove(`WARN: missing tile at (${cell.r},${cell.c}) during shift`); return; }
            const nr = cell.r+dr*shiftCells, nc = cell.c+dc*shiftCells;
            elx.style.gridRowStart = nr+1; elx.style.gridColumnStart = nc+1;
            elx.style.transform = '';
          });

          const matchEl = tileMap[dragMatchCell.r+','+dragMatchCell.c];
          const matchVal = board[dragMatchCell.r][dragMatchCell.c];
          if(dragObstruction && dragObstruction.val === matchVal){
            logMove(`${logPrefix} -> MATCH (axis) tile(${dragMatchCell.r},${dragMatchCell.c})=${matchVal} vs (${dragObstruction.r},${dragObstruction.c})=${dragObstruction.val}`);
            finalizeChainShift(dragChain, dr, dc, shiftCells, dragMatchCell);
            doMatch(dragMatchCell.r, dragMatchCell.c, dragLastR, dragLastC, dragObstruction.r, dragObstruction.c, matchEl);
          } else if(dragCrossPartner){
            const partnerVal = board[dragCrossPartner.r][dragCrossPartner.c];
            if(partnerVal !== matchVal){
              logMove(`${logPrefix} -> ABORTED cross-match mismatch! tile(${dragMatchCell.r},${dragMatchCell.c})=${matchVal} vs (${dragCrossPartner.r},${dragCrossPartner.c})=${partnerVal}`);
              wiggleChain(els)
                .then(()=> revertChainToOrigin(dragChain, axisLocked, dirName, maxPx, 150))
                .then(()=>{ setAnimating(false); })
                .catch((err)=>{ logMove('ERROR during abort-revert: '+err.message); setAnimating(false); });
            } else {
              const mr = dragMatchCell.r+dr*shiftCells, mc = dragMatchCell.c+dc*shiftCells;
              logMove(`${logPrefix} -> MATCH (cross) tile(${dragMatchCell.r},${dragMatchCell.c})=${matchVal} vs (${dragCrossPartner.r},${dragCrossPartner.c})=${partnerVal}`);
              finalizeChainShift(dragChain, dr, dc, shiftCells, dragMatchCell);
              doMatch(dragMatchCell.r, dragMatchCell.c, mr, mc, dragCrossPartner.r, dragCrossPartner.c, matchEl);
            }
          } else {
            logMove(`${logPrefix} -> NO MATCH, reverting`);
            wiggleChain(els)
              .then(()=> revertChainToOrigin(dragChain, axisLocked, dirName, maxPx, 150))
              .then(()=>{
                setAnimating(false);
                loseLife();
              })
              .catch((err)=>{ logMove('ERROR during revert: '+err.message); setAnimating(false); });
          }
        } catch(err){
          logMove(`ERROR: ${err.message} during ${logPrefix}`);
          setAnimating(false);
        }
      }).catch((err)=>{
        logMove(`ERROR: ${err.message} during drag snap`);
        setAnimating(false);
      });
    }

    el.addEventListener('pointercancel', ()=>{
      if(active && axisLocked!==null && dragChain){
        dragChain.forEach(cell=>{
          const e2 = tileMap[cell.r+','+cell.c];
          if(e2) e2.style.transform = '';
        });
      }
      active = false;
    });
  }

  function findMatchPartner(r,c,val){
    for(const dir in DIRS){
      const [dr,dc] = DIRS[dir];
      let nr=r+dr, nc=c+dc;
      while(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]==null){
        nr+=dr; nc+=dc;
      }
      if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===val){
        return {r:nr, c:nc};
      }
    }
    return null;
  }

  function attemptTap(r,c){
    if(animating) return;
    if(killerArmed){ fireTileKiller(r,c); return; }
    const val = board[r][c];
    if(val==null) return;
    const partner = findMatchPartner(r,c,val);
    if(partner){
      const partnerVal = board[partner.r][partner.c];
      if(partnerVal !== val){
        logMove(`tap (${r},${c})=${val} -> ABORTED mismatch vs (${partner.r},${partner.c})=${partnerVal}`);
        return;
      }
      logMove(`tap (${r},${c})=${val} -> MATCH vs (${partner.r},${partner.c})`);
      doMatch(r,c,r,c,partner.r,partner.c);
    } else {
      logMove(`tap (${r},${c}) val=${val} -> no partner`);
    }
  }

  // finishes a drag the rest of the way to its resting cell using known pixel offsets, no re-measuring
  function snapToFull(el, axis, dir, fromPx, maxPx, duration){
    return new Promise((resolve)=>{
      if(fromPx >= maxPx){ resolve(); return; }
      const sign = (dir==='right'||dir==='down') ? 1 : -1;
      const prop = axis==='x' ? 'translateX' : 'translateY';
      const anim = el.animate([
        { transform:`${prop}(${sign*fromPx}px)` },
        { transform:`${prop}(${sign*maxPx}px)` }
      ], { duration: D(duration), easing:'ease-out', fill:'forwards' });
      anim.onfinish = ()=>{ anim.cancel(); resolve(); };
    });
  }

  function wiggle(el, duration=300){
    return new Promise((resolve)=>{
      const anim = el.animate([
        { transform:'rotate(0deg)' },
        { transform:'rotate(-8deg)' },
        { transform:'rotate(7deg)' },
        { transform:'rotate(-5deg)' },
        { transform:'rotate(0deg)' }
      ], { duration: D(duration), easing:'ease-in-out' });
      anim.onfinish = resolve;
    });
  }

  function violentWiggle(el, duration=350){
    return new Promise((resolve)=>{
      const anim = el.animate([
        { transform:'rotate(0deg) scale(1)' },
        { transform:'rotate(-18deg) scale(1.08)' },
        { transform:'rotate(16deg) scale(0.95)' },
        { transform:'rotate(-14deg) scale(1.05)' },
        { transform:'rotate(12deg) scale(0.97)' },
        { transform:'rotate(0deg) scale(1)' }
      ], { duration: D(duration), easing:'ease-in-out' });
      anim.onfinish = resolve;
    });
  }

  function doMatch(r,c,lastR,lastC,tr,tc,moverElOverride){
    // mover is already visually at (lastR,lastC), adjacent to the target
    setAnimating(true);
    const mover = moverElOverride || tileMap[r+','+c];
    const target = tileMap[tr+','+tc];

    if(!mover || !target){
      logMove(`ERROR: doMatch aborted, missing element (mover=${!!mover} target=${!!target}) for (${r},${c})<->(${tr},${tc})`);
      setAnimating(false);
      return;
    }

    const mRect = mover.getBoundingClientRect();
    const tRect = target.getBoundingClientRect();
    const wrapRect = boardWrap.getBoundingClientRect();
    const mCenter = { x: mRect.left + mRect.width/2 - wrapRect.left, y: mRect.top + mRect.height/2 - wrapRect.top };
    const tCenter = { x: tRect.left + tRect.width/2 - wrapRect.left, y: tRect.top + tRect.height/2 - wrapRect.top };
    const distance = Math.hypot(tCenter.x-mCenter.x, tCenter.y-mCenter.y);
    const angle = Math.atan2(tCenter.y-mCenter.y, tCenter.x-mCenter.x) * 180/Math.PI;

    const midX = (mCenter.x + tCenter.x) / 2;
    const midY = (mCenter.y + tCenter.y) / 2;

    const lineWrap = document.createElement('div');
    lineWrap.className = 'match-line-wrap';
    lineWrap.style.left = midX + 'px';
    lineWrap.style.top = midY + 'px';
    lineWrap.style.transform = `rotate(${angle}deg)`;
    boardWrap.appendChild(lineWrap);

    const bar = document.createElement('div');
    bar.className = 'match-line';
    bar.style.width = distance + 'px';
    lineWrap.appendChild(bar);

    const dux = distance ? (tCenter.x - mCenter.x) / distance : 0;
    const duy = distance ? (tCenter.y - mCenter.y) / distance : 0;
    const cellSize = mRect.width;
    const recoil = cellSize * 0.5;
    const travel = distance * 0.5;
    const total = D(720);
    const matchColor = mover.style.background || PALETTE[board[r][c]] || '#ffffff';
    const isBombMatch = mover.classList.contains('bomb-tile');
    setTimeout(()=>{
      spawnShockwave(boardWrap, midX, midY, matchColor);
      if(isBombMatch) spawnSmokePuff(boardWrap, midX, midY);
    }, total*0.45);
    const horizontal = Math.abs(dux) >= Math.abs(duy);
    const t = (x,y,along,perp)=>{
      const sx = horizontal ? along : perp;
      const sy = horizontal ? perp : along;
      return `translate(${x}px,${y}px) scaleX(${sx}) scaleY(${sy})`;
    };

    // keeps the inner edge pinned at the shared midpoint as the along-axis scale
    // changes, so growth/squash reads as happening around the MERGED tile's
    // center rather than each tile's own individual center
    const alongPos = (alongScale)=> travel - cellSize*alongScale/2;

    // offsets: draw/hold -> recoil -> yank -> IMPACT -> squish-squash wobble -> vanish
    const moverAnim = mover.animate([
      { transform:t(0,0,1,1), offset:0 },
      { transform:t(0,0,1,1), offset:0.12 },
      { transform:t(-dux*recoil,-duy*recoil,1,1), offset:0.27 },
      { transform:t(dux*travel,duy*travel,1.265,0.935), offset:0.58 },
      { transform:t(dux*alongPos(0.5),duy*alongPos(0.5),0.5,1.1), offset:0.65 },
      { transform:t(dux*alongPos(0.44),duy*alongPos(0.44),0.44,1.432), offset:0.78 },
      { transform:t(dux*alongPos(0.5),duy*alongPos(0.5),0.5,1), offset:0.93 },
      { transform:t(dux*travel,duy*travel,0,0), offset:1 }
    ], { duration: total, easing:'ease-in-out', fill:'forwards' });

    target.animate([
      { transform:t(0,0,1,1), offset:0 },
      { transform:t(0,0,1,1), offset:0.12 },
      { transform:t(dux*recoil,duy*recoil,1,1), offset:0.27 },
      { transform:t(-dux*travel,-duy*travel,1.265,0.935), offset:0.58 },
      { transform:t(-dux*alongPos(0.5),-duy*alongPos(0.5),0.5,1.1), offset:0.65 },
      { transform:t(-dux*alongPos(0.44),-duy*alongPos(0.44),0.44,1.432), offset:0.78 },
      { transform:t(-dux*alongPos(0.5),-duy*alongPos(0.5),0.5,1), offset:0.93 },
      { transform:t(-dux*travel,-duy*travel,0,0), offset:1 }
    ], { duration: total, easing:'ease-in-out', fill:'forwards' });

    // bar only ever handles translate(-50%,-50%) [static centering on the wrapper's
    // rotation point] + scaleX [length] + height [thickness]; rotation lives on the
    // wrapper alone, so there's no ambiguity about transform composition order.
    // Fully gone by the moment of impact (0.58), matching the tiles' yank-end.
    bar.animate([
      { transform:'translate(-50%,-50%) scaleX(0)', height:'2px', offset:0 },
      { transform:'translate(-50%,-50%) scaleX(1)', height:'2px', offset:0.12 },
      { transform:'translate(-50%,-50%) scaleX(1)', height:'2px', offset:0.27 },
      { transform:'translate(-50%,-50%) scaleX(0)', height:'9px', offset:0.58 },
      { transform:'translate(-50%,-50%) scaleX(0)', height:'9px', offset:1 }
    ], { duration: total, fill:'forwards' });

    moverAnim.onfinish = ()=>{
      mover.remove(); target.remove(); lineWrap.remove();
      if(tileMap[r+','+c] === mover){
        delete tileMap[r+','+c];
        board[r][c] = null;
      }
      delete tileMap[tr+','+tc];
      board[tr][tc] = null;
      remaining -= 2;
      setAnimating(false);
      checkWin();
    };
  }

  function flashOuch(){
    const flash = document.getElementById('ouch-flash');
    flash.animate([
      { opacity:0 },
      { opacity:0.35, offset:0.2 },
      { opacity:0 }
    ], { duration: D(700), easing:'ease-out' });
    wiggleChain(Object.values(tileMap), 700);
  }

  let vDripInterval = null;

  function spawnVDrip(){
    const v = document.createElement('div');
    v.textContent = 'V';
    v.style.position = 'absolute';
    v.style.left = (Math.random()*100) + '%';
    v.style.top = '-30px';
    v.style.color = '#e0102a';
    v.style.fontWeight = '900';
    v.style.fontSize = (14 + Math.random()*20) + 'px';
    v.style.textShadow = '0 0 6px rgba(255,0,0,0.8), 0 2px 0 #4a0008';
    v.style.pointerEvents = 'none';
    v.style.zIndex = '0';
    overlayLose.appendChild(v);

    const duration = 2200 + Math.random()*2200;
    const anim = v.animate([
      { transform:'translateY(0)', opacity:1 },
      { transform:`translateY(${window.innerHeight+60}px)`, opacity:0.85 }
    ], { duration, easing:'linear' });
    anim.onfinish = ()=> v.remove();
  }

  function startVDrip(){
    if(vDripInterval) return;
    vDripInterval = setInterval(spawnVDrip, 160);
  }

  function stopVDrip(){
    clearInterval(vDripInterval);
    vDripInterval = null;
  }

  function loseLife(){
    lives--;
    levelHadMistake = true;
    if(diffusersAvailable <= 0 && perfectStreak > 0){
      perfectStreak = 0;
      renderDiffuser();
      pulseLockMistake();
    }
    renderLives();
    flashOuch();
    if(lives <= 0){
      document.getElementById('highest-level-text').textContent = `Highest Level: ${highestLevel}`;
      overlayLose.classList.add('show');
      startVDrip();
    }
  }

  // one dotted-ring sprite: rises, decelerates, settles slightly, fades — no
  // real particles, just one SVG element animated with WAAPI
  // soft grey smoke puffs that drift up and fizzle out, for when bombs get
  // defused via a normal match (as opposed to actually detonating)
  function spawnSmokePuff(container, x, y){
    const count = 8;
    for(let i=0;i<count;i++){
      const size = 14 + Math.random()*18;
      const driftX = (Math.random()-0.5)*40;
      const driftY = -30 - Math.random()*35;
      const delay = Math.random()*600;
      const shade = 90 + Math.floor(Math.random()*60); // varied grey

      const puff = document.createElement('div');
      puff.style.position = 'absolute';
      puff.style.left = x+'px';
      puff.style.top = y+'px';
      puff.style.width = size+'px';
      puff.style.height = size+'px';
      puff.style.marginLeft = (-size/2)+'px';
      puff.style.marginTop = (-size/2)+'px';
      puff.style.borderRadius = '50%';
      puff.style.background = `rgba(${shade},${shade},${shade},0.55)`;
      puff.style.pointerEvents = 'none';
      puff.style.zIndex = '150';
      puff.style.opacity = '0';
      container.appendChild(puff);

      setTimeout(()=>{
        const anim = puff.animate([
          { transform:'translate(0,0) scale(0.4)', opacity:0.7, offset:0 },
          { transform:`translate(${driftX*0.5}px, ${driftY*0.5}px) scale(1)`, opacity:0.5, offset:0.5 },
          { transform:`translate(${driftX}px, ${driftY}px) scale(1.6)`, opacity:0, offset:1 }
        ], { duration: D(1000), easing:'ease-out' });
        anim.onfinish = ()=> puff.remove();
      }, delay);
    }
  }

  function spawnShockwave(container, x, y, color){
    const size = 40, dots = 10;
    const wrapper = document.createElement('div');
    wrapper.style.position = 'absolute';
    wrapper.style.left = x+'px';
    wrapper.style.top = y+'px';
    wrapper.style.width = size+'px';
    wrapper.style.height = size+'px';
    wrapper.style.marginLeft = (-size/2)+'px';
    wrapper.style.marginTop = (-size/2)+'px';
    wrapper.style.pointerEvents = 'none';
    wrapper.style.zIndex = '110';

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
    const cx = size/2, cy = size/2, r = size/2-4;
    for(let i=0;i<dots;i++){
      const angle = (i/dots)*Math.PI*2;
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', cx + r*Math.cos(angle));
      circle.setAttribute('cy', cy + r*Math.sin(angle));
      circle.setAttribute('r', 1.25);
      circle.setAttribute('fill', color);
      svg.appendChild(circle);
    }
    wrapper.appendChild(svg);
    container.appendChild(wrapper);

    const anim = wrapper.animate([
      { transform:'scale(0.2)', opacity:1 },
      { transform:'scale(3.85)', opacity:0 }
    ], { duration: D(300), easing:'ease-out' });
    anim.onfinish = ()=> wrapper.remove();
  }

  function spawnFirework(container, x, y, color){
    const size = 90, dots = 12;
    const wrapper = document.createElement('div');
    wrapper.style.position = 'absolute';
    wrapper.style.left = x+'px';
    wrapper.style.top = y+'px';
    wrapper.style.width = size+'px';
    wrapper.style.height = size+'px';
    wrapper.style.pointerEvents = 'none';
    wrapper.style.zIndex = '110';

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
    const cx = size/2, cy = size/2, r = size/2-6;
    for(let i=0;i<dots;i++){
      const angle = (i/dots)*Math.PI*2;
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', cx + r*Math.cos(angle));
      circle.setAttribute('cy', cy + r*Math.sin(angle));
      circle.setAttribute('r', 3);
      circle.setAttribute('fill', color);
      svg.appendChild(circle);
    }
    wrapper.appendChild(svg);
    container.appendChild(wrapper);

    const t = (y2,s)=> `translate(-50%,-50%) translateY(${y2}px) scale(${s})`;
    const anim = wrapper.animate([
      { transform:t(10,0.1),  opacity:1, offset:0 },
      { transform:t(-45,0.7), opacity:1, offset:0.5 },
      { transform:t(-65,1),   opacity:1, offset:0.75 },
      { transform:t(-40,1),   opacity:0, offset:1 }
    ], { duration: D(1400), easing:'ease-out' });
    anim.onfinish = ()=> wrapper.remove();
  }

  let fireworksInterval = null;

  function shootFirework(){
    const rect = boardWrap.getBoundingClientRect();
    const colors = Object.values(PALETTE);
    const x = 30 + Math.random()*(rect.width-60);
    const y = rect.height*0.3 + Math.random()*(rect.height*0.35);
    const color = colors[Math.floor(Math.random()*colors.length)];
    spawnFirework(boardWrap, x, y, color);
  }

  function launchFireworks(){
    for(let i=0;i<6;i++){ setTimeout(shootFirework, i*180); }
    clearInterval(fireworksInterval);
    fireworksInterval = setInterval(shootFirework, 1000);
  }

  function stopFireworks(){
    clearInterval(fireworksInterval);
    fireworksInterval = null;
  }

  function checkWin(){
    if(remaining <= 0){
      if(levelHadMistake){
        perfectStreak = 0;
      } else {
        perfectStreak++;
        if(perfectStreak >= 3){
          perfectStreak = 0;
          diffusersAvailable++;
          logMove(`Earned a Tile Killer charge (now have ${diffusersAvailable})`);
        }
      }
      renderDiffuser();
      overlayWin.classList.add('show');
      launchFireworks();
    }
  }

  document.getElementById('btn-debug-toggle').addEventListener('click', ()=>{
    document.getElementById('debug-panel').classList.toggle('show');
  });
  document.getElementById('btn-preview-rescale').addEventListener('click', (e)=>{
    const on = document.body.classList.toggle('preview-shrink');
    e.target.textContent = `Preview Rescale: ${on ? 'On' : 'Off'}`;
  });
  document.getElementById('btn-debug-restart').addEventListener('click', ()=>{
    startLevel();
  });
  document.getElementById('btn-debug-solve').addEventListener('click', ()=>{
    debugSolve();
  });
  document.getElementById('btn-logs').addEventListener('click', ()=>{
    const report = `Slide Match debug report\nLevel: ${level}  Lives: ${lives}  Remaining tiles: ${remaining}\n\nRecent moves (oldest first):\n${moveLog.join('\n') || '(none yet)'}\n\nCurrent board (. = empty):\n${boardSnapshot()}`;
    const btn = document.getElementById('btn-logs');
    const showCopied = ()=>{ const old=btn.textContent; btn.textContent='Copied!'; setTimeout(()=>{ btn.textContent=old; }, 1200); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(report).then(showCopied).catch(()=>{
        const ta = document.createElement('textarea');
        ta.value = report; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); }catch(err){}
        document.body.removeChild(ta);
        showCopied();
      });
    }
  });

  document.getElementById('btn-hint').addEventListener('click', ()=>{
    showHint();
  });
  document.getElementById('btn-help').addEventListener('click', ()=>{
    document.getElementById('tutorial-overlay').classList.add('show');
  });
  document.getElementById('tutorial-overlay').addEventListener('click', ()=>{
    document.getElementById('tutorial-overlay').classList.remove('show');
  });
  document.getElementById('btn-diffuser').addEventListener('click', ()=>{
    toggleTileKiller();
  });
  document.getElementById('btn-restart').addEventListener('click', ()=>{
    showTitleScreen(true);
  });
  document.getElementById('btn-next').addEventListener('click', ()=>{
    level++;
    startLevel();
  });

  window.addEventListener('error', (e)=>{
    logMove(`JS ERROR: ${e.message}`);
    setAnimating(false);
  });
  window.addEventListener('unhandledrejection', (e)=>{
    const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
    logMove(`PROMISE ERROR: ${msg}`);
    setAnimating(false);
  });

  updateBoardScale(); // run once before first render, per Height-First Auto-Scaling

  // game starts once the player taps the title screen's Continue button
})();
</script>
</body>
</html>
