}
#debug-panel button:active{ background:#243440; }
</style>
</head>
<body>

<div id="app">
  <h1 id="game-title">Sort Stack</h1>
  <div id="hud">
    <span id="move-count">Moves: 0</span>
  </div>
  <div id="board-wrap"><div id="columns-container"></div></div>
  <div id="bottom-bar">
    <div id="bottom-bar-left">
      <a id="btn-home" href="../">Home</a>
      <button id="btn-mute" aria-label="Mute sound">&#128266;</button>
    </div>
    <button id="btn-restart-hud">Restart</button>
  </div>
</div>

<div class="overlay win" id="overlay-win">
  <h2>Sorted!</h2>
  <div id="win-moves" style="color:#cfd3dc; font-size:14px; margin-top:-8px;"></div>
  <button id="btn-next">Play Again</button>
</div>

<button id="btn-debug-toggle">Debug</button>
<div id="debug-panel">
  <button id="btn-debug-restart">Restart</button>
  <button id="btn-debug-solve">Solve</button>
  <button id="btn-logs">Logs</button>
</div>

<script>
/* ---------- sound (landing plinks) ----------
   Built with raw Web Audio API — deliberately NOT Tone.js/any CDN. Last
   attempt used Tone.js from a CDN and caused a total input freeze in the
   in-chat preview (confirmed after the fact to be a preview-sandbox
   quirk, not a real bug — downloaded/real-device builds worked fine the
   whole time). Going dependency-free this time removes that risk-class
   entirely, matches the manual-oscillator pattern already used
   elsewhere (EmojiMon SoundManager), and means sound can NEVER be the
   reason the whole game fails to load, on any platform.

   Everything here is wrapped defensively — if the browser doesn't
   support Web Audio at all, `audioCtx` stays null and playLandingSound
   silently no-ops. Nothing here runs at script-top-level except a single
   `let audioCtx = null;` declaration — actual AudioContext creation is
   deferred until the first real user gesture (see initAudioOnFirstInput
   below), since browsers block autoplay of audio before any interaction
   anyway, so creating it eagerly would be pointless even if it were
   safe.
*/
let audioCtx = null;
let audioInitAttempted = false;

// Mute state, persisted across sessions via localStorage. This is a
// standalone downloaded HTML file the player runs directly (not an
// in-chat artifact), so localStorage is the right tool here — it just
// needs to survive the player closing and reopening the file/tab.
// Wrapped in try/catch: some browsers block localStorage entirely in
// certain contexts (private browsing, file:// restrictions on some
// mobile browsers) — a blocked localStorage should never crash the game,
// it should just fall back to "not muted" for that session.
const MUTE_STORAGE_KEY = 'sortstack_muted';
let isMuted = false;
try {
  isMuted = localStorage.getItem(MUTE_STORAGE_KEY) === 'true';
} catch(err) {
  isMuted = false; // localStorage unavailable — default to unmuted, never throw
}

function setMuted(muted){
  isMuted = muted;
  try { localStorage.setItem(MUTE_STORAGE_KEY, muted ? 'true' : 'false'); }
  catch(err) { /* localStorage unavailable — mute still works for this session, just won't persist */ }
  const btn = document.getElementById('btn-mute');
  if(btn){
    btn.classList.toggle('muted', muted);
    btn.innerHTML = muted ? '&#128263;' : '&#128266;'; // muted speaker vs speaker-with-waves
    btn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
  }
}

function initAudioOnFirstInput(){
  if(audioInitAttempted) return;
  audioInitAttempted = true;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC){ console.warn('Web Audio not supported — game will run silently.'); return; }
    audioCtx = new AC();
  } catch(err) {
    console.warn('Audio init failed — game will run silently.', err);
    audioCtx = null;
  }
}

// Each landing's pitch is derived directly from that block's leadOrder
// (its fixed position in the landing sequence, assigned once per move —
// see flyBlocksToColumn), not a shared mutable counter. This avoids any
// risk of async callback ordering jitter producing an inconsistent pitch
// sequence under real-world frame drops.

// One tritone (6 semitones) per box, compounding off the base pitch of
// whichever box landed first in this move. Semitone ratio is the 12th
// root of 2, so N semitones up = 2^(N/12).
const SEMITONES_PER_BOX = 2; // whole-tone step — a full 16-box run climbs
                              // ~2.67 octaves through a whole-tone scale,
                              // which avoids landing on the harsh tritone
                              // interval a bigger step would repeatedly hit
const BASE_FREQ_HZ = 220; // A3 — comfortable mid-low base "plink" pitch

// Shared two-layer tone generator: a full-volume fundamental plus a
// quiet, faster-decaying octave-up partial on top, for a rounder,
// bell-like character (a single bare sine tends to sound thin/buzzy at
// fast attack). Used by both the landing-plink sound and the victory
// jingle below — one function, two call sites, no duplicated oscillator
// setup code to keep in sync.
//
// startAtSec: audioCtx.currentTime-relative offset for when this note
// should begin (0 = right now). durationSec: how long the note rings
// before fading to silence. Every call creates its own fully independent
// oscillator+gain node pair — true one-shot behavior, nothing shared or
// reused, so any number of overlapping/scheduled notes can never steal
// or cut off from one another.
function playTone(freq, startAtSec, durationSec){
  if(!audioCtx || isMuted) return; // isMuted guards ALL sound in the game — every landing
                                    // plink, the victory jingle, and the column-complete
                                    // jingle all funnel through this one function, so one
                                    // check here is sufficient; no need to guard each caller.
  const now = audioCtx.currentTime;
  const startAt = now + startAtSec;
  const attack = 0.005;
  const decay = durationSec;

  const playPartial = (partialFreq, peakGain, partialDecay) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = partialFreq;

    // linear ramps (not exponential) — widely supported, no edge cases
    // with exponentialRampToValueAtTime's "can't ramp to exactly 0" quirk
    gain.gain.setValueAtTime(0, startAt);
    gain.gain.linearRampToValueAtTime(peakGain, startAt + attack);
    gain.gain.linearRampToValueAtTime(0, startAt + attack + partialDecay);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startAt);
    osc.stop(startAt + attack + partialDecay + 0.02);
  };

  playPartial(freq, 0.22, decay);              // fundamental — the "main" note
  playPartial(freq * 2, 0.08, decay * 0.6);     // quiet octave-up shimmer, fades faster
  // let the browser garbage-collect these nodes naturally once stopped —
  // no manual cleanup needed, each oscillator is single-use by design
}

// Single-box moves always land at exactly BASE_FREQ_HZ, so a run of
// single-box moves in a row plays the literal identical note every
// time — "plucking the same cord". This offers a small set of nearby
// semitone offsets to randomly pick from for JUST single-box moves, so
// repeated single moves feel varied rather than mechanically identical.
// Multi-box moves are untouched: their first landing must stay locked to
// BASE_FREQ_HZ exactly, since every following box's pitch in that stack
// is computed relative to it (see SEMITONES_PER_BOX climb) — randomizing
// the anchor note would make the whole stack's climb unpredictable.
const SINGLE_BOX_VARIATION_SEMITONES = [-2, 0, 0, 2]; // whole tone down, none (x2, more common), whole tone up

function playLandingSound(pitchIndexInStack, isSingleBoxMove){
  if(!audioCtx) return; // audio unavailable or not yet initialized — silently skip, game unaffected
  try {
    let semitoneOffset = pitchIndexInStack * SEMITONES_PER_BOX;
    if(isSingleBoxMove){
      const variation = SINGLE_BOX_VARIATION_SEMITONES[
        Math.floor(Math.random() * SINGLE_BOX_VARIATION_SEMITONES.length)
      ];
      semitoneOffset += variation;
    }
    const freq = BASE_FREQ_HZ * Math.pow(2, semitoneOffset / 12);
    // Each call creates its own oscillator(s) + gain node(s) — these are
    // cheap, one-shot, and fully independent of each other. This is the
    // direct equivalent of "Play One Shot": calling this 16 times in
    // quick succession creates 16 independent overlapping sounds, not 16
    // competing triggers on one shared voice. No shared/global oscillator
    // node exists anywhere in this file, so there is nothing for
    // overlapping calls to steal or cut off from one another.
    playTone(freq, 0, 0.28);
  } catch(err) {
    // never let a sound failure affect gameplay
  }
}

// Standard note-name → frequency (equal temperament, A4 = 440Hz).
function noteNameToFreq(name){
  const NOTE_SEMITONES = { C:-9, 'C#':-8, D:-7, 'D#':-6, E:-5, F:-4, 'F#':-3, G:-2, 'G#':-1, A:0, 'A#':1, B:2 };
  const m = name.match(/^([A-G]#?)(\d)$/);
  const [, letter, octaveStr] = m;
  const octave = parseInt(octaveStr, 10);
  const semitoneFromA4 = NOTE_SEMITONES[letter] + (octave - 4) * 12;
  return 440 * Math.pow(2, semitoneFromA4 / 12);
}

// Shared jingle player, written in the [Xms] notation: `~` extends the
// PRECEDING note by one more beat (so "B4 ~" = B4 held for 2 beats
// total), a plain note name is a new 1-beat note. Parses the pattern
// once into a flat list of {freq, startBeat, beats} notes, then
// schedules all of them at once via playTone's startAtSec offset — this
// is a single one-shot burst of pre-scheduled notes, not a step-by-step
// timer loop, so it can't be disrupted by frame drops once triggered.
// Used by both the victory jingle and the column-complete jingle below —
// one parser/scheduler, two patterns.
function playJinglePattern(pattern, tempoMs){
  if(!audioCtx) return;
  try {
    const notes = []; // { freq, startBeat, beats }
    pattern.forEach(token => {
      if(token === '~'){
        if(notes.length > 0) notes[notes.length - 1].beats += 1;
      } else {
        notes.push({ freq: noteNameToFreq(token), startBeat: 0, beats: 1 });
      }
    });
    // fill in each note's actual start beat now that final lengths are known
    let cursor = 0;
    notes.forEach(n => { n.startBeat = cursor; cursor += n.beats; });

    const beatSec = tempoMs / 1000;
    notes.forEach(n => {
      const startAtSec = n.startBeat * beatSec;
      // slightly shorter than the full held length so notes don't
      // completely smear into the next one, but still clearly "held"
      // for multi-beat notes rather than sounding like a single blip
      const durationSec = (n.beats * beatSec) * 0.85;
      playTone(n.freq, startAtSec, durationSec);
    });
  } catch(err) {
    // never let a sound failure affect gameplay
  }
}

const VICTORY_TEMPO_MS = 140;
const VICTORY_PATTERN = ['B4','~','B4','B4','A4','G4','A4','B4','A4','B4','~','~','B4'];
function playVictoryJingle(){
  playJinglePattern(VICTORY_PATTERN, VICTORY_TEMPO_MS);
}

const COLUMN_COMPLETE_TEMPO_MS = 90;
const COLUMN_COMPLETE_PATTERN = ['E3','F3','E3','G3','A3','E4','~','~','E4'];
function playColumnCompleteJingle(){
  playJinglePattern(COLUMN_COMPLETE_PATTERN, COLUMN_COMPLETE_TEMPO_MS);
}

/* ---------- config ---------- */
const COLUMN_COUNT = 6;
const COLUMN_CAPACITY = 16;
const COLOR_COUNT = 4; // number of distinct block types in play
const COLORS = ['#e94b4b', '#3aa1ff', '#3ad07a', '#f0b93a', '#a55ee0', '#ff8fc9', '#4bd0d0'].slice(0, COLOR_COUNT);

/* ---------- state ---------- */
let columns = [];       // array of arrays; each inner array is a stack, index 0 = bottom
let selected = null;    // index of selected column, or null — the ONLY state that drives move logic
let pressHighlight = null; // PURELY VISUAL: column highlighted during an active press/hold.
                            // Deliberately kept separate from `selected` so a fast tap's own
                            // pointerdown can never be mistaken for a second, later tap on an
                            // already-selected column.
let pendingGestureSource = null; // column where the CURRENT press started, or null between gestures
let lastHoverCol = null; // most recent column the pointer was actually confirmed over during
                          // the current gesture — needed because a fast flick's pointerup
                          // coordinates can land outside any column (finger already lifting
                          // past the edge), even though it was clearly over a column a moment
                          // earlier. elementFromPoint at release time alone isn't reliable at speed.
let moveCount = 0;
let animating = false;  // true while a flight animation is in progress; blocks input

/* ---------- idle hint (nudge after 45s of no input) ----------
   Sandwich Programming: resetIdleHintTimer() is the Start Cue, called
   from every real input (pointerdown) and every completed move — either
   one means "the player is actively engaged," so both restart the same
   45s countdown. triggerIdleHint() is the filling: it throbs whatever
   columns currently have a legal move, using the SAME hasLegalMove()
   logic attemptMove() itself uses, so the hint can never suggest a move
   that isn't actually legal. stopIdleHintTimer() is the End Cue, called
   once at the win screen — no hint should ever appear once the game is
   already over.
*/
let idleHintTimeoutId = null;   // the initial 45s wait before the FIRST throb
let idleHintIntervalId = null;  // the repeating 5s throb after that

function resetIdleHintTimer(){
  clearTimeout(idleHintTimeoutId);
  clearInterval(idleHintIntervalId);
  idleHintIntervalId = null;
  idleHintTimeoutId = setTimeout(() => {
    triggerIdleHint(); // first throb, right at the 45s mark
    idleHintIntervalId = setInterval(triggerIdleHint, 5000); // then every 5s after that
  }, 45000);
}

function stopIdleHintTimer(){
  clearTimeout(idleHintTimeoutId);
  clearInterval(idleHintIntervalId);
  idleHintTimeoutId = null;
  idleHintIntervalId = null;
}

function triggerIdleHint(){
  if(animating) return; // don't throb mid-flight — wait for the board to settle
  const hintCols = columnsWithLegalMove();
  hintCols.forEach(ci => {
    const colEl = columnsContainer.children[ci];
    if(!colEl) return;
    // top block = the LAST real (non-empty-slot) block element in the
    // column, since .column is column-reverse (index 0 = bottom, so the
    // visually topmost block is the last one appended in render()).
    const realBlocks = colEl.querySelectorAll('.block:not(.empty-slot)');
    const topBlock = realBlocks[realBlocks.length - 1];
    if(!topBlock) return;
    topBlock.classList.remove('throb');
    void topBlock.offsetWidth; // force reflow so re-adding retriggers the CSS animation
    topBlock.classList.add('throb');
  });
}

const boardWrap = document.getElementById('board-wrap');
const columnsContainer = document.getElementById('columns-container');
const moveCountEl = document.getElementById('move-count');

const BLOCKS_PER_COLOR = 16; // fixed count regardless of board size

function generateBoard(){
  // fixed multiset: COLOR_COUNT colors x BLOCKS_PER_COLOR each, scattered
  // fully randomly across all COLUMN_COUNT columns (no reserved empty column,
  // no even-spread guarantee — a column can end up empty or nearly full by chance).
  let pool = [];
  for(let c = 0; c < COLOR_COUNT; c++){
    for(let i = 0; i < BLOCKS_PER_COLOR; i++) pool.push(c);
  }

  // shuffle the pool itself (color order)
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  columns = Array.from({length: COLUMN_COUNT}, () => []);

  // assign each block to a uniformly random column, skipping columns already
  // at capacity so we never overflow
  pool.forEach(colorIdx => {
    let target;
    let attempts = 0;
    do {
      target = Math.floor(Math.random() * COLUMN_COUNT);
      attempts++;
    } while(columns[target].length >= COLUMN_CAPACITY && attempts < 200);
    if(columns[target].length < COLUMN_CAPACITY){
      columns[target].push(colorIdx);
    } else {
      // extreme edge case: every column somehow full — dump in first with room
      const fallback = columns.findIndex(c => c.length < COLUMN_CAPACITY);
      if(fallback !== -1) columns[fallback].push(colorIdx);
    }
  });

  // avoid trivial already-solved board (rare with random scatter, but cheap to guard)
  if(isSolved()) return generateBoard();
}

function isSolved(){
  return columns.every(col => col.length === 0 ||
    (col.length === COLUMN_CAPACITY && col.every(v => v === col[0])));
}

// Same "full and single color" check as isSolved(), scoped to one
// column — used to detect a column becoming complete mid-game, distinct
// from the whole board being solved.
function isColumnComplete(colIndex){
  const col = columns[colIndex];
  return col.length === COLUMN_CAPACITY && col.every(v => v === col[0]);
}

// Mirrors attemptMove's exact destOk check (same file, further down) —
// deliberately NOT a reimplementation from scratch, so this can never
// drift out of sync with what actually counts as a legal move in this
// game. Used only for the idle-hint system below; has no effect on move
// resolution itself.
function hasLegalMove(fromCol, toCol){
  const srcArr = columns[fromCol];
  const dstArr = columns[toCol];
  if(srcArr.length === 0) return false;
  const moving = srcArr[srcArr.length - 1];
  return dstArr.length < COLUMN_CAPACITY &&
    (dstArr.length === 0 || dstArr[dstArr.length - 1] === moving);
}

// Returns the set of column indices that have at least one legal
// outgoing move available right now — i.e. columns the idle-hint throb
// should highlight. O(n²) over COLUMN_COUNT (6 columns = 36 checks),
// trivial cost, fine to call on every hint tick rather than caching.
function columnsWithLegalMove(){
  const result = new Set();
  for(let from = 0; from < COLUMN_COUNT; from++){
    for(let to = 0; to < COLUMN_COUNT; to++){
      if(from === to) continue;
      if(hasLegalMove(from, to)){ result.add(from); break; }
    }
  }
  return result;
}

// Column-complete visual: a diagonal white shine sweeps from the bottom
// of the column to the top, then disappears; the moment it disappears,
// every block in that column throbs once (a quick scale-pulse).
//
// The shine element lives on boardWrap, NOT inside the .column itself —
// render() completely rebuilds every .column element on every block
// landing (see render()'s comments), so anything appended inside a
// column would be torn out mid-animation the next time render() runs.
// boardWrap is only ever appended to, never rebuilt (this is the same
// pattern flying blocks already use), so the shine safely survives its
// full travel regardless of what render() does elsewhere in the meantime.
//
// Uses the column's LIVE getBoundingClientRect() at call time. This is
// called from the flight's final onDone callback, which fires after
// render() has already settled from the last block landing — so the
// column element and its rect are stable and won't shift again before
// this reads them.
function playColumnCompleteShine(colIndex){
  const colEl = columnsContainer.children[colIndex];
  if(!colEl) return; // defensive — shouldn't happen, but never let a visual effect throw

  const wrapRect = boardWrap.getBoundingClientRect();
  const colRect = colEl.getBoundingClientRect();

  const clip = document.createElement('div');
  clip.className = 'column-shine-clip';
  clip.style.left = (colRect.left - wrapRect.left) + 'px';
  clip.style.top = (colRect.top - wrapRect.top) + 'px';
  clip.style.width = colRect.width + 'px';
  clip.style.height = colRect.height + 'px';

  const band = document.createElement('div');
  band.className = 'column-shine-band';
  clip.appendChild(band);
  boardWrap.appendChild(clip);

  const SHINE_MS = 950;
  // Start the (rotated) band fully below the column's visible area and
  // animate its vertical center up to fully above it — the clip's
  // overflow:hidden means only the portion currently over the column is
  // ever visible, so a plain translateY sweep is enough; no need to
  // account for the 45° rotation in the Y math itself.
  const anim = band.animate([
    { transform: 'translateY(' + (colRect.height + 40) + 'px) rotate(-45deg)', offset: 0 },
    { transform: 'translateY(' + (-colRect.height - 40) + 'px) rotate(-45deg)', offset: 1 }
  ], { duration: SHINE_MS, easing: 'ease-in-out' });

  anim.onfinish = () => {
    // Shine's done — remove it, then throb every real block currently in
    // this column. Re-query at animation-finish time (not using colEl
    // captured above) since render() may have rebuilt the column element
    // one or more times during the shine's travel — always throb whatever
    // blocks are actually on screen right now, not a stale reference.
    clip.remove();
    const liveColEl = columnsContainer.children[colIndex];
    if(!liveColEl) return;
    const blocks = liveColEl.querySelectorAll('.block:not(.empty-slot)');
    blocks.forEach(b => {
      // restart the animation even if somehow already present/mid-run
      b.classList.remove('throb');
      void b.offsetWidth; // force reflow so re-adding the class retriggers the CSS animation
      b.classList.add('throb');
    });
  };
}

// Cheap alternative to render() for press-highlight only: toggles the
// 'selected' class on existing .column elements directly instead of
// tearing down and rebuilding every column. Rebuilding mid-gesture (via
// full render()) was replacing the exact DOM node the pointer was down
// on, which on some mobile browsers caused pointerdown to re-fire on the
// replacement element — see the guard comment in the pointerdown handler.
// This function never touches the DOM tree structure, only classNames,
// so the elements a pointer is interacting with stay the same elements
// for the whole gesture.
function updateHighlightsOnly(){
  const cols = columnsContainer.children;
  for(let ci = 0; ci < cols.length; ci++){
    const isHighlighted = pendingGestureSource !== null
      ? pressHighlight === ci
      : (selected === ci || pressHighlight === ci);
    cols[ci].className = 'column' + (isHighlighted ? ' selected' : '');
  }
}

// Height-first responsive sizing. Replaces the earlier CSS-only
// --board-max-w formula, which guessed a fixed height/width ratio
// (~1.75) and a fixed pixel reservation (~200px) for the surrounding
// chrome (title/hud/bottom-bar/gaps) baked directly into a CSS calc().
// Those were both ESTIMATES taken from one measurement at the time they
// were written, and had no way to update themselves — they silently
// went stale the moment the real layout changed (mute button moved
// into the bottom bar, board size was doubled), which is exactly what
// produced the overflow in the screenshot report: the guessed ratio no
// longer matched the real rendered geometry.
//
// This version measures the ACTUAL rendered heights of every sibling
// element (title, hud, bottom-bar) plus #app's real gap/padding values
// (read from computed style, not re-guessed), figures out exactly how
// much vertical space is left for board-wrap, and solves for the width
// that produces EXACTLY that height — using the literal inverse of
// board-wrap's real CSS geometry (padding, column count, capacity,
// block aspect ratio, gaps), not an approximated ratio. Verified by
// round-trip (width→height→width) before shipping — see version log.
const BOARD_ASPECT = 1.4;       // .block's aspect-ratio (width/height)
const BLOCK_GAP_PX = 2;         // .column's gap between blocks
const COLUMN_GAP_PX = 10;       // #columns-container's gap between columns
const BOARD_PAD_V_PX = 16;      // #board-wrap padding: 16px 10px -> vertical side
const BOARD_PAD_H_PX = 10;      // #board-wrap padding: 16px 10px -> horizontal side
const BOARD_WIDTH_FLOOR_PX = 160; // never shrink the board narrower than this, even
                                   // on a pathologically short viewport — matches the
                                   // spirit of the old formula's 50px floor, raised
                                   // since the doubled board makes 50px look broken
                                   // (blocks would be sliver-thin rather than just small)
const BOARD_WIDTH_CEILING_PX = 840; // matches the old flat desktop cap — still a
                                     // sensible "don't get absurd on an ultrawide
                                     // monitor" ceiling, independent of height

function widthForBoardHeight(targetHeightPx){
  const colH = targetHeightPx - 2*BOARD_PAD_V_PX;
  const blockH = (colH - (COLUMN_CAPACITY-1)*BLOCK_GAP_PX) / COLUMN_CAPACITY;
  const colW = blockH * BOARD_ASPECT;
  const innerW = colW*COLUMN_COUNT + (COLUMN_COUNT-1)*COLUMN_GAP_PX;
  return innerW + 2*BOARD_PAD_H_PX;
}

// Forward direction (mirrors the actual CSS: #board-wrap width -> its
// rendered height) — needed so the scale-up logic below can check
// "if I scale this width up, does the resulting height still fit?"
// without assuming a pure linear relationship between the two (they're
// NOT perfectly linear — fixed padding offsets break exact
// proportionality, confirmed by testing before this was added).
function heightForBoardWidth(W){
  const innerW = W - 2*BOARD_PAD_H_PX;
  const colW = (innerW - (COLUMN_COUNT-1)*COLUMN_GAP_PX) / COLUMN_COUNT;
  const blockH = colW / BOARD_ASPECT;
  const colH = COLUMN_CAPACITY*blockH + (COLUMN_CAPACITY-1)*BLOCK_GAP_PX;
  return colH + 2*BOARD_PAD_V_PX;
}

let updateBoardScaleRAF = null;
function updateBoardScale(){
  // rAF-batched: resize can fire many times per second while dragging a
  // window edge; only ever want the LATEST call in a frame to actually
  // run the (cheap, but non-zero) measurement + layout write.
  if(updateBoardScaleRAF) cancelAnimationFrame(updateBoardScaleRAF);
  updateBoardScaleRAF = requestAnimationFrame(() => {
    updateBoardScaleRAF = null;
    const appEl = document.getElementById('app');
    const titleEl = document.getElementById('game-title');
    const hudEl = document.getElementById('hud');
    const bottomBarEl = document.getElementById('bottom-bar');
    if(!appEl || !titleEl || !hudEl || !bottomBarEl) return; // defensive — shouldn't happen

    const appStyle = getComputedStyle(appEl);
    const appPadV = parseFloat(appStyle.paddingTop) + parseFloat(appStyle.paddingBottom);
    const appGap = parseFloat(appStyle.rowGap || appStyle.gap) || 0;
    // #app has 4 flex children (title, hud, board-wrap, bottom-bar) -> 3 gaps between them
    const totalGaps = appGap * 3;

    const chromeHeight = titleEl.offsetHeight + hudEl.offsetHeight + bottomBarEl.offsetHeight
      + appPadV + totalGaps;
    const trueAvailableHeight = window.innerHeight - chromeHeight;

    // BOARD_SCALE_FACTOR: per feedback, exact-fit sizing read as
    // conservative — requested +20%.
    //
    // An earlier version of this defined trueAvailableHeight as the
    // ABSOLUTE ceiling (100% of real leftover space) and only granted
    // the +20% if scaling up still fit UNDER that same ceiling — which
    // is mathematically impossible by construction: trueAvailableHeight
    // already equals the maximum the viewport could ever offer, so
    // 1.2x that value can NEVER pass a "still fits under 100%" check.
    // That version fell back to the unscaled exact-fit size on every
    // single call, which is exactly the "ironically unchanged" bug
    // reported back — not an edge case, a guaranteed-every-time failure
    // that pure code inspection missed because the individual pieces
    // (the fallback check, the clamps) each looked reasonable in
    // isolation.
    //
    // Fix: apply the +20% directly to the measured available height and
    // USE that as the board's target, without a self-defeating "must
    // still fit under the un-scaled ceiling" check. This deliberately
    // allows the board to extend past the exact chrome-reserved space —
    // on most real screens that's fine (window.innerHeight already
    // excludes browser UI chrome, and there's typically some slack from
    // how conservatively fonts/paddings render); on a screen with truly
    // zero slack, the existing overflow-y:auto on body (from the v0.47
    // fix) means the worst case is a few pixels of scroll, never a
    // silently clipped/invisible element — there's no failure mode here
    // as severe as the ones earlier versions were guarding against.
    const BOARD_SCALE_FACTOR = 1.2;
    let targetW = widthForBoardHeight(trueAvailableHeight * BOARD_SCALE_FACTOR);

    // also respect viewport WIDTH — a tall narrow phone shouldn't let the
    // height-derived value push the board wider than the screen itself
    const widthCapFromViewport = window.innerWidth * 0.92;

    targetW = Math.min(targetW, widthCapFromViewport, BOARD_WIDTH_CEILING_PX);
    targetW = Math.max(targetW, BOARD_WIDTH_FLOOR_PX);

    appEl.style.setProperty('--board-max-w', targetW + 'px');
  });
}

function render(justMovedTo = null){
  columnsContainer.innerHTML = '';
  columns.forEach((col, ci) => {
    const colEl = document.createElement('div');
    // While a gesture is actively in progress, show ONLY the press column —
    // a leftover `selected` from a prior, separate gesture must not also
    // light up, or a drag started while something else is selected reads
    // as two simultaneous selections even though only one drives logic.
    const isHighlighted = pendingGestureSource !== null
      ? pressHighlight === ci
      : (selected === ci || pressHighlight === ci);
    colEl.className = 'column' + (isHighlighted ? ' selected' : '');
    colEl.dataset.index = ci;
    colEl.style.setProperty('--capacity', COLUMN_CAPACITY);
    col.forEach((colorIdx, bi) => {
      const block = document.createElement('div');
      block.className = 'block';
      block.style.background = COLORS[colorIdx];
      colEl.appendChild(block);
    });
    const emptySlots = COLUMN_CAPACITY - col.length;
    for(let s = 0; s < emptySlots; s++){
      const slot = document.createElement('div');
      slot.className = 'block empty-slot';
      colEl.appendChild(slot);
    }
    colEl.addEventListener('pointerdown', () => {
      // Guard against re-entry: on some mobile browsers, a sustained touch
      // that lands on a freshly-rebuilt element (which is exactly what
      // happens below, since render() replaces every .column node) can
      // re-fire pointerdown on that NEW element as if it were a fresh
      // press, even though the physical finger never lifted. Each re-fire
      // called render() again, which built yet another new element,
      // which could re-fire again — a loop that ate the gesture and
      // explains the "21 pointerdowns, 2 pointerups" pattern in the logs.
      // A pointerdown while a gesture is already pending is never a new
      // gesture — it's this re-target artifact — so ignore it entirely.
      if(pendingGestureSource !== null) return;
      resetIdleHintTimer(); // real input detected — restart the 45s idle countdown
      initAudioOnFirstInput(); // first real user gesture — safe point to create AudioContext,
                                // matches browser autoplay-policy requirements. No-ops on repeat calls.
      log(`input: press col${ci}`);
      pendingGestureSource = ci;
      lastHoverCol = ci; // gesture starts here, so this is the first known-good hover column
      if(columns[ci].length > 0){
        pressHighlight = ci; // cosmetic only — never touches `selected`
        updateHighlightsOnly();
      }
    });
    // NOTE: pointerup/pointercancel are deliberately NOT bound here on
    // colEl — see the document-level listeners below for why.
    columnsContainer.appendChild(colEl);
  });
  moveCountEl.textContent = `Moves: ${moveCount}`;
}

/* ---------- diagnostic log ----------
   Lightweight ring buffer of recent events, dumped by the Logs button.
   Captures moves and per-block flight timing so animation bugs (like
   stutter during a specific phase) can be pinpointed from a paste.
*/
const LOG_MAX = 200;
let logBuffer = [];
function log(msg){
  const t = performance.now().toFixed(0);
  logBuffer.push(`[${t}ms] ${msg}`);
  if(logBuffer.length > LOG_MAX) logBuffer.shift();
}

// catch any uncaught JS errors into the same log, so a "nothing responds"
// report can reveal a real exception instead of just silence
window.addEventListener('error', (e) => {
  log(`JS ERROR: ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`);
});
window.addEventListener('unhandledrejection', (e) => {
  log(`UNHANDLED REJECTION: ${e.reason}`);
});

// Tracks the most recent column actually under the pointer while a gesture
// is active. Needed because a fast flick's pointerup can land outside any
// column (finger lifts past the edge mid-motion) even though it was
// clearly dragging over a real column a moment before release —
// elementFromPoint at release time alone misses that. Document-level (not
// per-column) so it still catches the pointer crossing gaps/board edges.
document.addEventListener('pointermove', (e) => {
  if(pendingGestureSource === null) return; // no gesture in progress, ignore
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const colEl = target ? target.closest('.column') : null;
  if(colEl) lastHoverCol = Number(colEl.dataset.index);
});

// pointerup/pointercancel are bound at the DOCUMENT level rather than on
// individual .column elements. Reason: pressHighlight's own render() call
// (triggered from pointerdown) rebuilds every .column element mid-gesture,
// destroying the original element the pointerdown fired on and replacing
// it with a fresh one. A listener bound to that original element is gone
// along with it — on some browsers the pointer was never "handed off" to
// the new element, so pointerup silently never reaches any listener at
// all. Binding once at the document level sidesteps this entirely: it
// doesn't matter how many times the columns get rebuilt mid-press, this
// listener is never destroyed.
document.addEventListener('pointerup', (e) => onGestureEnd(e));
document.addEventListener('pointercancel', () => onGestureEnd(null));

/* ---------- flight animation ----------
   Each moving block does its own independent 3-phase motion:
     1) rise straight up until fully above the board-wrap's outer top edge
        (a fixed clearance from the panel top — same for every block,
        regardless of which column/row it started in)
     2) arc sideways to the destination column's x position, peaking
        ~20% higher than the step-1 clearance height, staying above
        the panel the whole time
     3) lower straight down into its landing slot in the destination column
   Blocks in a run launch staggered STAGGER_MS apart, but each runs its
   full independent path — no shared timing beyond the launch delay.
   Real board data/DOM does not change until every block has landed.
*/
const STAGGER_MS = 90;
const FLIGHT_MS = 350;
const SQUASH_MS = 160; // duration of the land-squash (phase 4), added on top of FLIGHT_MS
const CLEARANCE = 24; // px above board-wrap's own top edge that step 1 rises to
const ARC_BUMP_RATIO = 0.20; // extra peak height during arc, as a fraction of CLEARANCE

function flyBlocksToColumn(fromIndex, toIndex, count, colorIdx, onBlockLanded, onDone){
  log(`FLIGHT start: col${fromIndex}→col${toIndex}, count=${count}, color=${colorIdx}`);
  const fromColElInitial = columnsContainer.children[fromIndex];
  const wrapRect = boardWrap.getBoundingClientRect();

  const fromRealBlocks = Array.from(fromColElInitial.querySelectorAll('.block:not(.empty-slot)'));
  const sourceBlocks = fromRealBlocks.slice(fromRealBlocks.length - count);

  const blockRect = sourceBlocks[0].getBoundingClientRect();
  const blockW = blockRect.width, blockH = blockRect.height;
  const gap = 2; // matches .column gap

  // fixed clearance line, same for every block: board-wrap's own top edge
  // minus CLEARANCE, expressed in board-wrap-relative coordinates
  const clearanceY = -CLEARANCE;
  const archPeakY = clearanceY - (CLEARANCE * ARC_BUMP_RATIO);

  // landing slot numbers are computed once, up front, from the destination's
  // PRE-MOVE length — this must NOT be re-read live, because per-block
  // renders will change columns[toIndex].length as each block's data lands,
  // and later-launching blocks would otherwise target the wrong (shifted) slot.
  const destStartLen = columns[toIndex].length;

  let remaining = count;
  const checkDone = () => {
    remaining--;
    if(remaining <= 0){
      log(`FLIGHT complete: col${fromIndex}→col${toIndex}, all ${count} block(s) landed`);
      onDone();
    }
  };

  sourceBlocks.forEach((originalSrcBlock, i) => {
    // i=0 is bottom-most of the moving run, i=count-1 is top-most.
    // Top block physically leaves first (it's on top of the source pile),
    // and lands FIRST too — in the lowest available new slot. Each
    // subsequent block leaves after and stacks on top of the one before it,
    // so the destination pile visibly builds bottom-up as blocks arrive.
    const leadOrder = count - 1 - i;
    const landingIndexFromBottom = destStartLen + leadOrder;

    setTimeout(() => {
      // re-query the CURRENT top-most real block in the source column live —
      // don't trust the reference captured at the top of the function, since
      // an earlier block in this same run may have already triggered a
      // render() that replaced the entire source column's DOM, leaving that
      // captured reference detached (getBoundingClientRect would read as 0).
      const liveFromColEl = columnsContainer.children[fromIndex];
      const liveRealBlocks = liveFromColEl.querySelectorAll('.block:not(.empty-slot)');
      const srcBlock = liveRealBlocks[liveRealBlocks.length - 1] || originalSrcBlock;

      const srcRect = srcBlock.getBoundingClientRect();
      const startX = srcRect.left - wrapRect.left;
      const startY = srcRect.top - wrapRect.top;

      // pop this block's data out of the source column NOW, at launch time,
      // not at landing. This is the block that's physically leaving (top of
      // whatever remains in the source pile) — so removing from the end of
      // the live array is always correct regardless of how many blocks in
      // this run have already launched/landed before it.
      columns[fromIndex].pop();
      render(); // reflects the now-correct (one shorter) source column —
                // no opacity hack needed, the real DOM simply won't include
                // this block anymore since the data doesn't either

      // re-query the destination column fresh: an earlier block's landing
      // may have already triggered a render() that replaced the element
      // captured at the top of this function, making that reference stale
      const toColEl = columnsContainer.children[toIndex];
      const toColRect = toColEl.getBoundingClientRect();
      // measure endX from an existing real block in the destination column (or the
      // source block's own width as fallback) so it lands aligned with actual block
      // edges, not the column container's padded/bordered edge
      const toRealBlock = toColEl.querySelector('.block:not(.empty-slot)');
      const endX = toRealBlock
        ? (toRealBlock.getBoundingClientRect().left - wrapRect.left)
        : (toColRect.left - wrapRect.left + 6); // 4px padding + 2px border fallback
      const endY = (toColRect.bottom - wrapRect.top) - ((landingIndexFromBottom + 1) * (blockH + gap)) + gap;

      log(`  block ${i+1}/${count} launch: start(${startX.toFixed(0)},${startY.toFixed(0)}) → end(${endX.toFixed(0)},${endY.toFixed(0)})`);

      const flyer = document.createElement('div');
      flyer.className = 'block flying';
      flyer.style.width = blockW + 'px';
      flyer.style.height = blockH + 'px';
      flyer.style.background = COLORS[colorIdx];
      boardWrap.appendChild(flyer);

      const anim = flyer.animate([
        // phase 0: at rest, normal scale
        { transform: `translate(${startX}px, ${startY}px) scale(0.45, 1.82)`,            offset: 0 },        // entrance: already stretched
        // phase 1 (rise): maintain stretch while rising
        { transform: `translate(${startX}px, ${clearanceY}px) scale(0.45, 1.82)`,       offset: 0.3 },
        // phase 2 (arc): regulate back to normal scale at the peak
        { transform: `translate(${endX}px, ${archPeakY}px) scale(1, 1)`,                offset: 0.6 },
        // phase 3 (fall): stretch again — 55% narrower, 82% taller, falling into place
        { transform: `translate(${endX}px, ${clearanceY}px) scale(0.45, 1.82)`,         offset: 0.8 },
        { transform: `translate(${endX}px, ${endY}px) scale(0.45, 1.82)`,               offset: 1 }
      ], { duration: FLIGHT_MS, easing: 'ease-out', fill: 'forwards' });

      // log when phase 3 (fall) begins, matching the 0.8 offset above
      setTimeout(() => log(`  block ${i+1}/${count} phase3 (fall) start`), FLIGHT_MS * 0.8);

      anim.onfinish = () => {
        log(`  block ${i+1}/${count} phase3 end, starting land-squash`);
        // Sound fires HERE, at the true moment of impact — right as the
        // fall ends and the squash begins — not in squash.onfinish below.
        // Firing it at squash-end meant the sound played a full
        // SQUASH_MS after the block visually hit, which read as
        // sluggish/delayed. leadOrder is this block's fixed position in
        // the landing sequence (0 = first to land this move).
        playLandingSound(leadOrder, count === 1);

        // phase 4: land-squash — squish down 60% on Y, widen 60% on X, then
        // unsquish back to normal. This is pure "filling" (visual only),
        // sandwiched safely between the existing start/complete cues —
        // the actual data swap doesn't happen until THIS finishes too.
        const squash = flyer.animate([
          { transform: `translate(${endX}px, ${endY}px) scale(0.45, 1.82)`,  offset: 0 },    // arrives already stretched from the fall
          { transform: `translate(${endX}px, ${endY}px) scale(1.6, 0.4)`,    offset: 0.4 },  // 4A: squash down, widen out
          { transform: `translate(${endX}px, ${endY}px) scale(1, 1)`,        offset: 1 }     // 4B: unsquish back to normal
        ], { duration: SQUASH_MS, easing: 'ease-out', fill: 'forwards' });

        squash.onfinish = () => {
          log(`  block ${i+1}/${count} landed at (${endX.toFixed(0)},${endY.toFixed(0)})`);
          // 4C: end of flight animation — swap immediately: remove this flyer
          // and hand off to onBlockLanded, which moves this one block's data
          // and re-renders columns-container. Other flyers (siblings on
          // board-wrap, untouched by that render) keep animating uninterrupted.
          flyer.remove();
          onBlockLanded();
          checkDone();
        };
      };
    }, leadOrder * STAGGER_MS);
  });
}

function onGestureEnd(e){
  // called on BOTH pointerup and pointercancel. Always ends the visual
  // press-hold regardless of what happens next.
  log(`input: ${e === null ? 'pointercancel' : 'pointerup'} (startCol=${pendingGestureSource})`);
  pressHighlight = null;
  const startCol = pendingGestureSource;
  const hoverCol = lastHoverCol;
  pendingGestureSource = null;
  lastHoverCol = null;

  if(e === null) { log('  → aborted, no action (pointercancel)'); render(); return; }

  render();
  if(animating){ log('  → ignored, animating'); return; }
  if(startCol === null){ log('  → ignored, no startCol'); return; }

  // find whichever column is actually under the pointer at release —
  // for a fast tap this is the same column as startCol; for a drag it's
  // wherever the finger/cursor ended up. Either way, hand off to the same
  // single function: it doesn't need to know or care which kind of
  // gesture this was.
  const target = document.elementFromPoint(e.clientX, e.clientY);
  const colEl = target ? target.closest('.column') : null;
  // Fast flicks can release with the pointer already past the board edge —
  // elementFromPoint finds nothing there. Fall back to the last column we
  // saw the pointer actually over during this same gesture (tracked via
  // pointermove) instead of treating it as "released outside, no action".
  const endCol = colEl ? Number(colEl.dataset.index) : hoverCol;
  if(endCol === null){ log('  → ignored, no endCol resolvable'); return; }
  log(`  → resolved startCol=${startCol} endCol=${endCol}`);

  attemptSelectOrMove(startCol, endCol);
}

// The ONE function that contains all real selection/move game logic.
// Called with (startCol, endCol) — the column a gesture started on and
// the column it ended on. A tap and a drag both funnel through here
// identically; startCol only matters when nothing is currently selected
// (establishing what THIS gesture picks up), endCol is what everything
// else (deselect-toggle, move-destination) is evaluated against.
function attemptSelectOrMove(startCol, endCol){
  if(animating) return;

  if(startCol === endCol){
    // TAP: press and release on the same column. Use the existing
    // select/deselect toggle against whatever is currently selected.
    if(selected === null){
      if(columns[startCol].length === 0) return; // nothing to pick up
      selected = startCol;
      render();
      return;
    }
    if(selected === startCol){
      selected = null; // deselect
      render();
      return;
    }
    // selected holds some OTHER column from a prior gesture, and this tap
    // landed on a different one — attempt selected -> startCol as a move.
    attemptMove(selected, startCol);
    return;
  }

  // DRAG: press and release on different columns within ONE gesture.
  // This always attempts startCol -> endCol directly as the move, using
  // wherever THIS gesture began as the source — regardless of whatever
  // `selected` happened to be left over from some earlier, separate
  // interaction. If startCol has nothing to pick up or the move is
  // illegal, attemptMove's own fallback handles reselecting endCol.
  attemptMove(startCol, endCol);
}

// Shared move-attempt core used by BOTH the tap and drag paths above.
// fromCol = source column, toCol = the column the gesture ended on.
function attemptMove(fromCol, toCol){
  if(columns[fromCol].length === 0){
    selected = null;
    render();
    return;
  }

  const srcArr = columns[fromCol];
  const dstArr = columns[toCol];
  const moving = srcArr[srcArr.length - 1];

  const destOk = dstArr.length < COLUMN_CAPACITY &&
    (dstArr.length === 0 || dstArr[dstArr.length - 1] === moving);

  if(destOk){
    // count the same-color run sitting on top of the source column
    let runSize = 1;
    while(runSize < srcArr.length && srcArr[srcArr.length - 1 - runSize] === moving) runSize++;

    const room = COLUMN_CAPACITY - dstArr.length;
    const moveCount_ = Math.min(runSize, room); // partial run if destination can't fit it all

    const fromIndex = fromCol;
    const toIndex = toCol;
    selected = null;
    animating = true;
    render(); // clear selection highlight; data hasn't moved yet, flight happens first

    flyBlocksToColumn(fromIndex, toIndex, moveCount_, moving,
      () => {
        // fires once PER landed block: the source pop already happened at
        // LAUNCH time (inside flyBlocksToColumn, so mid-run renders show
        // the correct shrinking source column). This only pushes the
        // arriving block into the destination and re-renders.
        columns[toIndex].push(moving);
        render();
      },
      () => {
        // fires once the WHOLE run has landed
        moveCount++;
        animating = false;
        resetIdleHintTimer(); // a real move just completed — restart the 45s idle countdown
        // Check the DESTINATION column specifically for "just became a
        // complete, single-color, full stack" — a move can only ever
        // complete the column it just landed in, so no need to scan all
        // columns. This is independent of isSolved() below: a column
        // completing and the whole board completing can legitimately
        // happen on the same move (e.g. the last column finishes and
        // that also happens to be the final column overall) — both
        // sounds are allowed to play together in that case.
        if(isColumnComplete(toIndex)) {
          playColumnCompleteJingle();
          playColumnCompleteShine(toIndex);
        }
        if(isSolved()) onBoardComplete();
      }
    );
  } else {
    // illegal move — just reselect the destination column if it has blocks, else clear
    selected = columns[toCol].length > 0 ? toCol : null;
    render();
  }
}

/* ---------- cue signals ----------
   "bread, not filling": onBoardComplete fires the instant the board is
   sorted. onBoardCompleteSettled fires BREATH_MS later — that's the one
   that actually triggers the win screen. Anything else that should react
   to "board just finished" (sound, particles, etc.) hooks onBoardComplete;
   anything that should wait for the pause to finish hooks onBoardCompleteSettled.
*/
const BREATH_MS = 700; // total wait before the win screen pops up (was 800 originally,
                        // then bumped to 1100 for "+300ms"; latest instruction set the
                        // TOTAL wait to 700ms directly, replacing both prior values)

function onBoardComplete(){
  setTimeout(onBoardCompleteSettled, BREATH_MS);
}

function onBoardCompleteSettled(){
  onWin();
}

/* ---------- win screen ---------- */
/* ---------- victory fireworks (Victory Screen pattern) ----------
   One dotted-ring sprite per firework: rises, decelerates, settles
   slightly, fades — no real particle system, just one SVG element
   animated with WAAPI. Positioned relative to boardWrap, same overlay
   pattern as flying blocks and the column-complete shine (boardWrap is
   never rebuilt by render(), so effects anchored to it survive safely
   regardless of what's happening in columnsContainer underneath).
*/
function spawnFirework(container, x, y, color){
  const size = 90, dots = 12;
  const wrapper = document.createElement('div');
  wrapper.style.position = 'absolute';
  wrapper.style.left = x+'px';
  wrapper.style.top = y+'px';
  wrapper.style.width = size+'px';
  wrapper.style.height = size+'px';
  wrapper.style.pointerEvents = 'none';
  wrapper.style.zIndex = '110';

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  const cx = size/2, cy = size/2, r = size/2-6;
  for(let i=0;i<dots;i++){
    const angle = (i/dots)*Math.PI*2;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx + r*Math.cos(angle));
    circle.setAttribute('cy', cy + r*Math.sin(angle));
    circle.setAttribute('r', 3);
    circle.setAttribute('fill', color);
    svg.appendChild(circle);
  }
  wrapper.appendChild(svg);
  container.appendChild(wrapper);

  const t = (y2,s)=> `translate(-50%,-50%) translateY(${y2}px) scale(${s})`;
  const anim = wrapper.animate([
    { transform:t(10,0.1),  opacity:1, offset:0 },
    { transform:t(-45,0.7), opacity:1, offset:0.5 },
    { transform:t(-65,1),   opacity:1, offset:0.75 },
    { transform:t(-40,1),   opacity:0, offset:1 }
  ], { duration: 1400, easing:'ease-out' });
  anim.onfinish = ()=> wrapper.remove();
}

let fireworksInterval = null;

function shootFirework(){
  const rect = boardWrap.getBoundingClientRect();
  const colors = COLORS; // this game's existing block color palette
  const x = 30 + Math.random()*(rect.width-60);
  const y = rect.height*0.3 + Math.random()*(rect.height*0.35);
  const color = colors[Math.floor(Math.random()*colors.length)];
  spawnFirework(boardWrap, x, y, color);
}

function launchFireworks(){
  for(let i=0;i<6;i++){ setTimeout(shootFirework, i*180); } // quick initial burst of 6
  clearInterval(fireworksInterval);
  fireworksInterval = setInterval(shootFirework, 1000);     // then one every second
}

function stopFireworks(){
  clearInterval(fireworksInterval);
  fireworksInterval = null;
}

function onWin(){
  document.getElementById('win-moves').textContent = `Solved in ${moveCount} moves`;
  document.getElementById('overlay-win').classList.add('show');
  playVictoryJingle();
  stopIdleHintTimer(); // game's over — no idle nudges should appear on the win screen
  launchFireworks();
}
function closeWin(){
  document.getElementById('overlay-win').classList.remove('show');
  // IMPORTANT (per Victory Screen pattern): stopFireworks() must be
  // called on every "leave this screen" path — Restart, Play Again, and
  // any future one — or the setInterval in launchFireworks() keeps
  // firing forever in the background. Putting it here, inside
  // closeWin() (which startLevel() already calls unconditionally),
  // covers every current and future exit path in one place rather than
  // relying on each caller to remember it individually.
  stopFireworks();
}

/* ---------- restart ---------- */
function startLevel(){
  moveCount = 0;
  selected = null;
  animating = false;
  closeWin();
  generateBoard();
  render();
  logBuffer = [];
  log('New level started');
  resetIdleHintTimer(); // fresh level, fresh 45s countdown
}

/* ---------- debug solve (dev tool, not exposed to players) ---------- */
function debugSolve(){
  // brute-force: keep making any legal move that reduces mixed columns, greedy.
  // not guaranteed optimal, just a fast dev-testing shortcut.
  let guard = 0;
  while(!isSolved() && guard < 500){
    guard++;
    let moved = false;
    for(let i = 0; i < columns.length && !moved; i++){
      if(columns[i].length === 0) continue;
      const top = columns[i][columns[i].length - 1];
      for(let j = 0; j < columns.length; j++){
        if(i === j) continue;
        const toCol = columns[j];
        if(toCol.length < COLUMN_CAPACITY && (toCol.length === 0 || toCol[toCol.length-1] === top)){
          // avoid moving to another empty column if source is single-type already fine
          if(toCol.length === 0 && columns[i].every(v => v === top)) continue;
          toCol.push(columns[i].pop());
          moveCount++;
          moved = true;
          break;
        }
      }
    }
    if(!moved) break;
  }
  render();
  if(isSolved()) onBoardComplete();
}

/* ---------- logs report ---------- */
function buildReport(){
  const lines = [];
  lines.push('=== SORT STACK DEBUG REPORT ===');
  lines.push(`Generated: ${new Date().toISOString()}`);
  lines.push(`Moves: ${moveCount}`);
  lines.push(`Columns: ${COLUMN_COUNT}, Capacity: ${COLUMN_CAPACITY}, Colors: ${COLOR_COUNT}`);
  lines.push(`Selected column: ${selected === null ? 'none' : selected}`);
  lines.push(`Animating: ${animating}`);
  lines.push('');
  lines.push('--- Board state (bottom → top per column) ---');
  columns.forEach((col, ci) => {
    lines.push(`Col ${ci}: [${col.join(',')}]  (${col.length}/${COLUMN_CAPACITY})`);
  });
  lines.push('');
  lines.push(`--- Event log (last ${logBuffer.length}) ---`);
  lines.push(...logBuffer);
  return lines.join('\n');
}

function copyReport(){
  const report = buildReport();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(report).then(() => {
      log('Report copied to clipboard');
    }).catch(() => {
      // clipboard permission can fail silently on some mobile browsers;
      // fall back to a visible textarea the user can manually copy from
      showReportFallback(report);
    });
  } else {
    showReportFallback(report);
  }
}

function showReportFallback(report){
  let ta = document.getElementById('report-fallback');
  if(!ta){
    ta = document.createElement('textarea');
    ta.id = 'report-fallback';
    ta.style.cssText = 'position:fixed; inset:10% 5%; z-index:400; width:90%; height:80%; font-size:11px; background:#111; color:#0f0; padding:10px; border-radius:8px;';
    document.body.appendChild(ta);
    // close on escape key
    ta.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') ta.style.display = 'none';
    });
  }
  ta.value = report;
  ta.style.display = 'block';
  ta.focus();
  ta.select();
}


document.getElementById('btn-restart-hud').addEventListener('click', startLevel);
document.getElementById('btn-next').addEventListener('click', startLevel);
document.getElementById('btn-debug-restart').addEventListener('click', startLevel);
document.getElementById('btn-debug-solve').addEventListener('click', debugSolve);
document.getElementById('btn-logs').addEventListener('click', copyReport);

document.getElementById('btn-mute').addEventListener('click', ()=>{
  setMuted(!isMuted);
});
setMuted(isMuted); // sync the button's icon/label to whatever was loaded from localStorage
                    // (or the try/catch fallback) before any click ever happens

document.getElementById('btn-debug-toggle').addEventListener('click', ()=>{
  const panel = document.getElementById('debug-panel');
  panel.classList.toggle('show');
  // also close logs window when toggling debug, for mobile convenience
  const ta = document.getElementById('report-fallback');
  if(ta) ta.style.display = 'none';
});

window.addEventListener('resize', updateBoardScale);
updateBoardScale(); // initial sizing pass, before startLevel() so the first render
                     // already has the correct --board-max-w set

startLevel();
</script>
