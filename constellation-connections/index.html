<!DOCTYPE html>
<!-- Constellation Connections | v1.4 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Constellation Connections</title>
<style>
  :root{
    --board-max-w: 420px;
    --bg-void:#050810;
    --bg-mid:#0d1b2e;
    --accent:#8fb8ff;
    --purple:#9b8fd9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at 30% -10%, rgba(155,143,217,0.14), transparent 55%),
      radial-gradient(ellipse at 80% 10%, rgba(90,140,255,0.10), transparent 50%),
      radial-gradient(circle at 50% 0%, var(--bg-mid), var(--bg-void) 70%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:#e4ecff;
    overflow-x:hidden;
    overscroll-behavior:none;
  }
  #app{
    display:flex; flex-direction:column;
    align-items:center;
    padding:14px 0 10px;
    gap:8px;
    min-height:100vh;
    touch-action:none;
    position:relative;
  }

  #starfield{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:0;
    pointer-events:none;
  }
  #app{ z-index:1; }
  #game-title{
    text-align:center;
    font-size:clamp(15px, 5.2vw, 20px);
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    line-height:1.25;
    color:#eef3ff;
    text-shadow:0 0 20px rgba(143,184,255,0.45), 0 0 44px rgba(155,143,217,0.25);
    padding:0 8px;
  }

  #info-row{
    width:var(--board-max-w);
    margin:0 auto;
    display:flex;
    justify-content:flex-end;
  }
  #btn-info{
    width:26px; height:26px;
    border-radius:50%;
    font-size:14px;
    font-weight:900;
    border:2px solid var(--purple);
    background:transparent;
    color:var(--purple);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    padding:0;
    margin-bottom:4px;
  }
  #btn-info:active{ background:rgba(100,83,148,0.15); }

  #hud{
    width:var(--board-max-w);
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    font-size:13px;
  }
  #hud .stat{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  #hud .stat .label{ font-size:9px; letter-spacing:1px; opacity:0.55; text-transform:uppercase; }
  #hud .stat .value{ font-size:17px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }

  #board-wrap{
    position:relative;
    width:var(--board-max-w);
    margin:0 auto;
    padding:10px;
    border-radius:18px;
    background:rgba(255,255,255,0.035);
    border:1px solid rgba(255,255,255,0.06);
  }
  #grid{
    position:relative;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    width:100%;
  }
  .cell{
    position:relative;
    aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
  }
  .ball{
    position:absolute;
    inset:2px;
    border-radius:50%; /* invisible circular tap target, no visible fill */
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.08s ease;
  }
  .star-visual{
    position:absolute;
    inset:0;
    transform:scale(calc(var(--star-scale, 1) * var(--bulk-scale, 1) * var(--bonus-scale, 1)));
    transition:transform 0.15s ease;
  }
  .star-shape{
    position:absolute;
    inset:6%;
    z-index:1;
    display:flex; align-items:center; justify-content:center;
    clip-path:polygon(
      50.0% 0.0%, 68.2% 24.9%, 97.6% 34.5%, 79.5% 59.6%,
      79.4% 90.5%, 50.0% 81.0%, 20.6% 90.5%, 20.5% 59.6%,
      2.4% 34.5%, 31.8% 24.9%
    );
    box-shadow:
      inset 0 -5px 8px rgba(0,0,0,0.3),
      inset 0 4px 6px rgba(255,255,255,0.4);
  }
  /* TEST: merge-color preview trace — a real DOM sibling of .star-shape
     (not a pseudo-element, so it's independently inspectable/debuggable),
     same clip-path polygon, sized slightly larger via inset, sitting BEHIND
     the real star. No blur at all — a crisp solid-color star silhouette
     that peeks out from behind the real star's points as a clean outline.
     Transparent/invisible by default. */
  .star-outline-trace{
    position:absolute;
    inset:1%;
    clip-path:polygon(
      50.0% 0.0%, 68.2% 24.9%, 97.6% 34.5%, 79.5% 59.6%,
      79.4% 90.5%, 50.0% 81.0%, 20.6% 90.5%, 20.5% 59.6%,
      2.4% 34.5%, 31.8% 24.9%
    );
    background: transparent;
    z-index:0;
  }
  .star-outline-trace.preview-outline{
    background: var(--preview-color, transparent);
  }
  .star-glow{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    filter:blur(9px);
    opacity:0.138;
    z-index:-1;
  }
  .star-label-backing{
    position:absolute;
    width:46%;
    height:46%;
    border-radius:50%;
    background:rgba(10,14,28,0.16);
    z-index:1;
  }
  .ball .star-label{
    position:relative;
    z-index:2;
    font-weight:800;
    font-size:clamp(11px, 3.6vw, 16px);
    color:#0a0e1c;
    line-height:1;
    pointer-events:none;
  }
  .ball.selected{
    transform:scale(1.16);
  }
  .ball.selected .star-shape{
    filter:drop-shadow(0 0 3px rgba(255,255,255,0.9));
  }
  .ball.newly-spawned{
    animation:dropIn 0.28s ease-out;
  }
  @keyframes dropIn{
    from{ transform:translateY(-140%); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }

  #path-svg{
    position:absolute;
    inset:10px;
    width:calc(100% - 20px);
    height:calc(100% - 20px);
    pointer-events:none;
    z-index:5;
  }
  #path-svg path{
    fill:none;
    stroke:#eaf1ff;
    stroke-width:4.5;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:0.95;
    filter:drop-shadow(0 0 5px rgba(143,184,255,0.75)) drop-shadow(0 0 10px rgba(143,184,255,0.35));
  }

  #action-row{
    position:relative;
    width:var(--board-max-w);
    margin:14px auto 0;
    display:flex;
    flex-direction:row;
    gap:8px;
    justify-content:center;
  }
  #btn-hub{
    margin-top:8px;
    margin-left:auto;
    margin-right:auto;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--purple);
    background:transparent;
    color:var(--purple);
    text-decoration:none;
    text-align:center;
    white-space:nowrap;
    cursor:pointer;
  }
  #btn-hub:active{ background:rgba(100,83,148,0.15); }

  #btn-mute{
    padding:6px 12px;
    border-radius:8px;
    border:1px solid var(--purple);
    background:transparent;
    color:var(--purple);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
    margin-top:8px;
    margin-left:auto;
  }
  #btn-mute:active{ background:rgba(100,83,148,0.15); }

  #btn-restart{
    margin-left:auto;
    margin-top:8px;
    padding:6px 14px;
    border-radius:8px;
    border:1px solid var(--purple);
    background:transparent;
    color:var(--purple);
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  #btn-restart:active{ background:rgba(100,83,148,0.15); }

  /* floating merge popup */
  .merge-pop{
    position:absolute;
    font-weight:900;
    font-size:15px;
    color:#ffe9a8;
    text-shadow:0 0 8px rgba(255,184,77,0.7), 0 0 4px rgba(0,0,0,0.6);
    pointer-events:none;
    z-index:30;
  }

  .combo-pop{
    position:absolute;
    top:50%; left:50%;
    font-weight:900;
    font-size:42px;
    letter-spacing:1px;
    color:#ffe14d;
    text-shadow:0 0 16px rgba(255,225,77,0.85), 0 0 6px rgba(0,0,0,0.7);
    pointer-events:none;
    z-index:40;
    white-space:nowrap;
  }
  .shockwave-ring{
    position:absolute;
    border-radius:50%;
    border:2px dotted #fff;
    pointer-events:none;
    z-index:29;
  }

  /* ---- Debug Button (screen-space) ---- */
  #btn-debug-toggle{
    position:fixed;
    left:6px; bottom:6px;
    z-index:300;
    font-size:10px;
    font-weight:700;
    padding:3px 8px;
    border-radius:5px;
    border:1px solid #2a2a2a;
    background:transparent;
    color:#3a3a3a;
    cursor:pointer;
  }
  #btn-debug-toggle:active{ background:rgba(255,255,255,0.05); }
  #debug-panel{
    position:fixed;
    left:6px; bottom:32px;
    z-index:300;
    display:none;
    flex-direction:column;
    gap:4px;
  }
  #debug-panel.show{ display:flex; }
  #debug-panel button{
    font-size:10px;
    font-weight:700;
    padding:3px 8px;
    border-radius:5px;
    border:1px solid #444;
    background:#1b2830;
    color:#888;
    cursor:pointer;
    text-align:left;
  }
  #debug-panel button:active{ background:#243440; }
  body.preview-shrink #board-wrap,
  body.preview-shrink #hud,
  body.preview-shrink #action-row,
  body.preview-shrink #info-row{
    width:min(73.6vw, 336px) !important;
  }

  /* overlay (tutorial) */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.88);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px;
    z-index:100;
    visibility:hidden;
    opacity:0;
    transition:opacity 0.2s;
    padding:24px;
    text-align:center;
  }
  .overlay.show{ visibility:visible; opacity:1; }
  .overlay h2{ margin:0; font-size:24px; color:var(--accent); }
  .overlay p{ max-width:320px; line-height:1.5; font-size:14px; color:#dfeee6; margin:0; }
  .overlay button{
    font-size:15px;
    font-weight:700;
    padding:10px 26px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:#0f1b16;
    cursor:pointer;
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="app">

  <div id="game-title">Constellation Connections</div>

  <div id="info-row">
    <button id="btn-info">?</button>
  </div>

  <div id="hud">
    <div class="stat"><div class="label">Highest Number</div><div class="value" id="hud-score">0</div></div>
    <div class="stat"><div class="label">Longest Line</div><div class="value" id="hud-best">0</div></div>
    <div class="stat"><div class="label">Constellations</div><div class="value" id="hud-merges">0</div></div>
  </div>

  <div id="board-wrap">
    <div id="grid"></div>
    <svg id="path-svg"><path id="path-line" d=""/></svg>
  </div>

  <div id="action-row">
    <a id="btn-hub" href="../">Home</a>
    <button id="btn-mute">🔊</button>
    <button id="btn-restart">Restart</button>
  </div>

  <button id="btn-debug-toggle">Debug</button>
  <div id="debug-panel">
    <button id="btn-debug-restart">Restart</button>
    <button id="btn-logs">Logs</button>
    <button id="btn-preview-rescale">Preview Rescale: Off</button>
  </div>

  <div class="overlay" id="overlay-tutorial">
    <h2>How to chart the sky</h2>
    <p>
      Click and drag to draw as long of a connection as possible with
      matching numbers nearby. You can do up/down/left/right/diagnol
      connections.
    </p>
    <button id="btn-close-tutorial">Got it</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ========================================
  // Constellation Connections | v1.3
  // Removed the "+#" chain-badge (redundant now that preview number shows
  // the final value directly). Preview number now snaps to each new Point B
  // star's position (updates once per star added) instead of continuously
  // following the finger between stars.
  // Filename changed from StarLinkGame to ConstellationGame. Preview number
  // (shows Point B's predicted value during drag) changed to yellow and
  // repositioned to the left of the cursor instead of the right.
  // Added cursor-following preview number + Point B frantic throb during
  // march (replacing the old soft-shrink). Fixed --bonus-scale getting
  // stuck inflated after throb cancel. NOTE: versioning was skipped for
  // several changes prior to this (mute/restart buttons, combo popup,
  // constellation fade line, twinkle volume, march speed, highest number
  // tracking) — all of that is included in this v1.1 file too.
  // Added "energy explosion" sound (noise-based, high-pitched, with a real
  // delay/feedback echo tail) for the board-wide milestone combo shockwave.
  // ========================================

  // ---------- Config ----------
  const COLS = 5, ROWS = 5;
  const COLORS = {
    1:'#e8c4ff', // nebula violet
    2:'#7fd4ff', // ice blue
    3:'#5a8fff', // deep blue
    4:'#b48cff', // amethyst
    5:'#ffb84d', // solar gold
    6:'#ff8f8f', // mars red
    7:'#7fffc4', // aurora green
    8:'#fff29a', // supernova
  };
  function colorFor(v){
    return COLORS[v] || COLORS[8];
  }
  const SPAWN_WEIGHTS = [ [1,40], [2,40], [3,12], [4,6], [5,2] ]; // value, weight

  // ---------- State ----------
  let grid = []; // grid[row][col] = {value, el, id}
  let uidCounter = 0;
  let highestNumber = 0;
  let bestChain = 0;
  let mergeCount = 0;
  let selecting = false;
  let selectedPath = []; // array of {r,c}
  let pointBForBonus = null; // tracks the Point B star during selection to apply bonus scale
  let boardLocked = false;
  const debugLog = [];
  const levelStartTime = performance.now();

  function logEvent(msg){
    const t = (performance.now() - levelStartTime).toFixed(0);
    debugLog.push(`[${t}ms] ${msg}`);
  }

  const gridEl = document.getElementById('grid');
  const pathSvg = document.getElementById('path-svg');
  const pathLine = document.getElementById('path-line');
  const boardWrap = document.getElementById('board-wrap');

  // ---------- Weighted random spawn ----------
  const weightPool = [];
  SPAWN_WEIGHTS.forEach(([v,w]) => { for(let i=0;i<w;i++) weightPool.push(v); });
  function randomValue(){
    return weightPool[Math.floor(Math.random()*weightPool.length)];
  }

  // ---------- Grid build ----------
  function initGrid(){
    grid = [];
    gridEl.innerHTML = '';
    highestNumber = 0; // resets on new game — only counts values the player
      // actually MERGES to, never values that just randomly spawn on the board
    for(let r=0;r<ROWS;r++){
      const row = [];
      for(let c=0;c<COLS;c++){
        const v = randomValue();
        const cell = createCell(r,c, v, false);
        row.push(cell);
      }
      grid.push(row);
    }
    logEvent('Grid init');
  }

  function createCell(r,c,value,animate){
    // Reuse the EXISTING grid slot at this (r,c) position (created once by
    // initGrid) rather than creating + appending a brand new cellDiv every
    // time. gridEl is a fixed 25-slot CSS grid; appending a fresh div on
    // every refill left the old, now-empty cellDiv orphaned in place,
    // silently growing gridEl's child count (and thus its rendered height)
    // by one extra empty row's worth of space on every single merge.
    const slotIndex = r*COLS + c;
    let cellDiv = gridEl.children[slotIndex];
    if(!cellDiv){
      // fallback for genuinely new slots (shouldn't happen post-initGrid,
      // but keeps this safe if createCell is ever called before init)
      cellDiv = document.createElement('div');
      cellDiv.className='cell';
      gridEl.appendChild(cellDiv);
    } else {
      cellDiv.innerHTML = ''; // clear out the previous ball, if any
    }
    cellDiv.dataset.r = r;
    cellDiv.dataset.c = c;

    const ball = document.createElement('div');
    ball.className = 'ball' + (animate ? ' newly-spawned' : '');
    ball.dataset.r = r;
    ball.dataset.c = c;

    const glow = document.createElement('div');
    glow.className = 'star-glow';

    const outlineTrace = document.createElement('div');
    outlineTrace.className = 'star-outline-trace';

    const shape = document.createElement('div');
    shape.className = 'star-shape';

    const visual = document.createElement('div');
    visual.className = 'star-visual';

    const backing = document.createElement('div');
    backing.className = 'star-label-backing';

    const label = document.createElement('div');
    label.className = 'star-label';
    label.textContent = value;

    shape.appendChild(backing);
    shape.appendChild(label);
    visual.appendChild(glow);
    visual.appendChild(outlineTrace);
    visual.appendChild(shape);
    ball.appendChild(visual);
    cellDiv.appendChild(ball);

    const obj = { value, ballEl: ball, cellEl: cellDiv, id: ++uidCounter };
    applyStarColor(obj, value);
    applyStarScale(obj, value);
    attachPointerHandlers(obj);
    return obj;
  }

  // Single source of truth for coloring a star — used on spawn, merge, and
  // reshuffle so all three stay visually consistent.
  function applyStarColor(obj, value){
    const c = colorFor(value);
    const shape = obj.ballEl.querySelector('.star-shape');
    const glow = obj.ballEl.querySelector('.star-glow');
    shape.style.background = `radial-gradient(circle at 34% 30%, ${lighten(c)}, ${c} 70%)`;
    glow.style.background = c;
  }

  // Star scale grows with value: low numbers are small, dim stars; high
  // numbers are bigger, brighter ones. Applied as a CSS var so it composes
  // cleanly with the existing .selected transform:scale() rather than
  // fighting over the same transform property.
  const STAR_SCALE_MIN = 0.55;
  const STAR_SCALE_MAX = 1.15;
  const STAR_SCALE_VALUE_CEILING = 8; // value at/above which scale maxes out
  function applyStarScale(obj, value){
    const t = Math.min(1, Math.max(0, (value-1)/(STAR_SCALE_VALUE_CEILING-1)));
    const scale = STAR_SCALE_MIN + (STAR_SCALE_MAX-STAR_SCALE_MIN)*t;
    obj.ballEl.style.setProperty('--star-scale', scale.toFixed(3));
  }

  function lighten(hex){
    // quick lighten for a highlight gradient stop
    const c = hex.replace('#','');
    const num = parseInt(c,16);
    let r = (num>>16)+70, g=((num>>8)&0xff)+70, b=(num&0xff)+70;
    r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
    return `rgb(${r},${g},${b})`;
  }

  // ---------- Pointer / drag chain logic ----------
  function attachPointerHandlers(cellObj){
    cellObj.ballEl.addEventListener('pointerdown', (e)=> onPointerDown(e, cellObj));
  }

  function cellAt(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS) return null;
    return grid[r][c];
  }

  function isAdjacent(a,b){
    const dr = Math.abs(a.r-b.r), dc = Math.abs(a.c-b.c);
    return dr<=1 && dc<=1 && !(dr===0&&dc===0);
  }

  function findCoords(cellObj){
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]===cellObj) return {r,c};
    return null;
  }

  // All stars currently in the chain share ONE bulk scale, which grows by
  // +10% for every star added to the chain (linear growth: a 5-star chain
  // has every one of its 5 stars at the SAME bulked size, not scaled
  // differently by position). Applied uniformly across the whole chain
  // whenever a star joins or leaves. Shrinks back to 1x progressively as
  // each star marches to Point B (see marchChain), not via an instant reset.
  const BULK_SCALE_PER_STAR = 0.05;
  function currentChainBulkScale(){
    return 1 + (selectedPath.length-1) * BULK_SCALE_PER_STAR;
  }
  function applyBulkScaleToChain(){
    const scale = currentChainBulkScale();
    selectedPath.forEach(p=>{
      const obj = grid[p.r][p.c];
      if(obj) obj.ballEl.style.setProperty('--bulk-scale', scale.toFixed(3));
    });
  }
  function resetBulkScale(obj){
    obj.ballEl.style.setProperty('--bulk-scale', '1');
  }

  // Milestone ripple: at chain length 7, 10, 13... (every 3rd link past 6),
  // fire a board-wide dotted shockwave + ripple throb on every star,
  // radiating outward from the star that was just added.
  function checkMilestoneRipple(chainLen, sourceObj){
    if(chainLen < 7) return;
    if((chainLen-7) % 3 !== 0) return; // 7, 10, 13, 16...
    logEvent(`Milestone ripple at chain length ${chainLen}`);
    triggerBoardRipple(sourceObj);
  }

  function onPointerDown(e, cellObj){
    if(boardLocked) return;
    e.preventDefault();
    const coords = findCoords(cellObj);
    if(!coords) return;
    selecting = true;
    selectedPath = [coords];
    cellObj.ballEl.classList.add('selected');
    logEvent(`Chain start cue: value=${cellObj.value} at (${coords.r},${coords.c})`);
    playConnectionTone(0, cellObj.value);
    applyBulkScaleToChain();
    updatePathVisual();
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp, { once:true });
    window.addEventListener('pointercancel', onPointerUp, { once:true });
  }

  function elementFromTouchPoint(x,y){
    const el = document.elementFromPoint(x,y);
    if(!el) return null;
    const ball = el.closest('.ball');
    return ball;
  }

  function onPointerMove(e){
    if(!selecting) return;
    
    const point = e.touches ? e.touches[0] : e;
    const ballEl = elementFromTouchPoint(point.clientX, point.clientY);
    if(!ballEl) return;
    const r = parseInt(ballEl.dataset.r), c = parseInt(ballEl.dataset.c);
    const cellObj = grid[r][c];
    if(!cellObj) return;

    const last = selectedPath[selectedPath.length-1];
    const lastObj = grid[last.r][last.c];

    // backtrack: if pointer returns to the second-to-last cell, pop
    if(selectedPath.length>=2){
      const prev = selectedPath[selectedPath.length-2];
      if(prev.r===r && prev.c===c){
        resetBulkScale(lastObj);
        lastObj.ballEl.classList.remove('selected');
        const poppedTrace = lastObj.ballEl.querySelector('.star-outline-trace');
        if(poppedTrace) poppedTrace.classList.remove('preview-outline');
        selectedPath.pop();
        applyBulkScaleToChain();
        updatePathVisual();
        return;
      }
    }

    // already in path -> ignore
    if(selectedPath.some(p=>p.r===r&&p.c===c)) return;

    // must match value and be adjacent to last
    if(cellObj.value !== lastObj.value) return;
    if(!isAdjacent(last, {r,c})) return;

    selectedPath.push({r,c});
    cellObj.ballEl.classList.add('selected');
    playConnectionTone(selectedPath.length-1, cellObj.value);
    applyBulkScaleToChain();
    checkMilestoneRipple(selectedPath.length, cellObj);
    
    // Track Point B star for bonus-scale growth during drag
    pointBForBonus = cellObj;
    
    updatePathVisual();
  }

  function onPointerUp(){
    window.removeEventListener('pointermove', onPointerMove);
    selecting = false;
    if(selectedPath.length >= 2){
      commitChain();
    } else {
      clearSelectionVisuals();
    }
  }

  function clearSelectionVisuals(){
    selectedPath.forEach(p=>{
      const obj = grid[p.r][p.c];
      if(obj){
        obj.ballEl.classList.remove('selected');
        resetBulkScale(obj);
        const trace = obj.ballEl.querySelector('.star-outline-trace');
        if(trace) trace.classList.remove('preview-outline');
      }
    });
    
    // Reset Point B's bonus scale
    if(pointBForBonus){
      pointBForBonus.ballEl.style.setProperty('--bonus-scale', '1');
      pointBForBonus = null;
    }
    
    selectedPath = [];
    pathLine.setAttribute('d','');
  }

  function updatePathVisual(){
    if(selectedPath.length===0){
      pathLine.setAttribute('d','');
      return;
    }
    const svgRect = pathSvg.getBoundingClientRect();
    const pts = selectedPath.map(p=>{
      const obj = grid[p.r][p.c];
      const br = obj.ballEl.getBoundingClientRect();
      const x = br.left + br.width/2 - svgRect.left;
      const y = br.top + br.height/2 - svgRect.top;
      return `${x},${y}`;
    });
    pathLine.setAttribute('d', 'M' + pts.join(' L'));

    const chainLen = selectedPath.length;
    const bonus = Math.floor(chainLen/3);
    
    // Point B's scale during the DRAG comes from --bulk-scale alone, same as
    // every other star in the chain (applyBulkScaleToChain, called above) —
    // no separate growth layer here anymore. Growing --bonus-scale on top of
    // that during the drag double-stacked Point B's scale vs. the rest of
    // the chain, which is what caused the non-uniform "gradient" look.
    // --bonus-scale is now ONLY used for the frantic throb during the march
    // (see commitChain/runMarchAndMerge), not during selection.
    
    // Live outline preview — every star currently in the chain gets
    // an outline trace in the color the merge will become.
    if(pointBForBonus && chainLen >= 2){
      const baseValue = pointBForBonus.value;
      const previewColor = colorFor(baseValue + bonus);
      selectedPath.forEach(p=>{
        const obj = grid[p.r][p.c];
        if(!obj) return;
        const trace = obj.ballEl.querySelector('.star-outline-trace');
        trace.classList.add('preview-outline');
        trace.style.setProperty('--preview-color', previewColor);
      });
    } else {
      selectedPath.forEach(p=>{
        const obj = grid[p.r][p.c];
        if(!obj) return;
        const trace = obj.ballEl.querySelector('.star-outline-trace');
        trace.classList.remove('preview-outline');
      });
    }
  }

  // ---------- Commit chain: sandwich programming ----------
  function commitChain(){
    boardLocked = true;
    logEvent(`Chain commit start cue: length=${selectedPath.length}`);
    const path = selectedPath.slice();
    const lastCoord = path[path.length-1];
    const lastObj = grid[lastCoord.r][lastCoord.c];
    const baseValue = lastObj.value;
    const bonus = Math.floor(path.length/3);
    const newValue = baseValue + bonus;

    bestChain = Math.max(bestChain, path.length);
    mergeCount++;
    highestNumber = Math.max(highestNumber, newValue);
    updateHud();

    // Update Point B's displayed number immediately on release
    lastObj.value = newValue;
    lastObj.ballEl.querySelector('.star-label').textContent = newValue;

    // Hold cue: the finished connection line stays visible and the chain
    // holds still for a beat before marching, so the completed line reads
    // clearly before it animates away. Start Cue = chain just committed.
    // End Cue = HOLD_BEFORE_MARCH_MS elapsed, which then kicks off the march.
    const HOLD_BEFORE_MARCH_MS = 150;
    logEvent('Hold start cue');
    setTimeout(()=>{
      logEvent('Hold end cue -> March start cue');
      runMarchAndMerge(path, lastObj, baseValue, newValue, bonus);
    }, HOLD_BEFORE_MARCH_MS);
  }

  function runMarchAndMerge(path, lastObj, baseValue, newValue, bonus){
    // Bulk-scale shrink now happens progressively INSIDE marchChain, driven
    // by each bead's own march progress (see the frame loop there) — not
    // reset in a single step here before marching starts.

    // Update Point B's appearance to show the final merged value before the
    // throb starts — color and scale based on newValue. This way the star
    // visually transforms to its final state while the frantic throb is
    // playing, so you see the transformation happen.
    applyStarColor(lastObj, newValue);
    applyStarScale(lastObj, newValue);

    // March each ball, one at a time starting from the FIRST ball selected,
    // step by step through the path's own cells until it reaches the last
    // ball's position. Start Cue = this function call. End Cue = the whole
    // march (every ball) finishing — collapseAndRefill only runs after that.
    // Frantic fast throbbing on Point B during the march — Start Cue = march
    // begins (right here, before marchChain is called). End Cue = march's
    // own promise resolving (all beads arrived), where we cancel it below.
    const visual = lastObj.ballEl.querySelector('.star-visual');
    lastObj._throbAnim = visual.animate([
      { transform:`scale(calc(var(--star-scale, 1) * var(--bulk-scale, 1) * var(--bonus-scale, 1)))` },
      { transform:`scale(calc(var(--star-scale, 1) * var(--bulk-scale, 1) * var(--bonus-scale, 1) * 1.3))` },
      { transform:`scale(calc(var(--star-scale, 1) * var(--bulk-scale, 1) * var(--bonus-scale, 1)))` }
    ], { duration:120, iterations:Infinity });

    marchChain(path, lastObj).then(()=>{
      logEvent('March end cue: all balls arrived');

      // Stop the frantic throb now that march is actually done, and reset
      // the bonus-scale variable it was riding on top of — otherwise the
      // star reverts to the CSS base state, but that base state is still
      // inflated by whatever --bonus-scale was left at from the drag.
      if(lastObj._throbAnim){
        lastObj._throbAnim.cancel();
        delete lastObj._throbAnim;
      }
      lastObj.ballEl.style.setProperty('--bonus-scale', '1');

      // remove marched balls from grid, mark for refill
      path.forEach((p,idx)=>{
        if(idx === path.length-1) return;
        grid[p.r][p.c] = null;
      });

      // update the merge target
      const targetRect = lastObj.ballEl.getBoundingClientRect();
      const boardRect = boardWrap.getBoundingClientRect();
      const targetX = targetRect.left - boardRect.left + targetRect.width/2;
      const targetY = targetRect.top - boardRect.top + targetRect.height/2;

      resetBulkScale(lastObj); // it's Point B, never a "bead" in marchChain's
        // loop, so its bulk-scale from selection was never shrunk back down
      lastObj.ballEl.classList.remove('selected');
      const lastTrace = lastObj.ballEl.querySelector('.star-outline-trace');
      if(lastTrace) lastTrace.classList.remove('preview-outline');

      throbAndShockwave(lastObj, targetX, targetY);

      showMergePop(targetX, targetY, `+${bonus>0?bonus:''}`.trim() || '✓', newValue);

      selectedPath = [];
      spawnConstellationFadeLine(pathLine.getAttribute('d'));
      pathLine.setAttribute('d','');

      collapseAndRefill();
    });
  }

  // Merge-complete flourish: the star throbs once (large single pulse),
  // then a dotted ring shockwave expands outward from its center and fades.
  // Total flourish duration: 600ms, sequenced rather than simultaneous so
  // both beats are actually visible instead of blurring into one flash.
  const THROB_DURATION_MS = 390;
  const SHOCKWAVE_DURATION_MS = 510;

  function throbAndShockwave(obj, x, y){
    const visual = obj.ballEl.querySelector('.star-visual');
    visual.animate([
      { transform:'scale(var(--star-scale,1))' },
      { transform:'scale(calc(var(--star-scale,1) * 2))' },
      { transform:'scale(var(--star-scale,1))' }
    ], { duration:THROB_DURATION_MS, easing:'ease-out' });

    // The "merge sound" (ascending per-star twinkles) plays live during the
    // march itself, as each star arrives at Point B — see marchChain. This
    // function only handles the visual throb + shockwave now.

    // shockwave starts right as the throb peaks, then continues past it
    setTimeout(()=>{
      spawnShockwave(boardWrap, x, y, colorFor(obj.value));
    }, THROB_DURATION_MS*0.4);
  }

  function spawnShockwave(container, x, y, color){
    const size = 90;
    const ring = document.createElement('div');
    ring.className = 'shockwave-ring';
    ring.style.left = x+'px';
    ring.style.top = y+'px';
    ring.style.width = size+'px';
    ring.style.height = size+'px';
    ring.style.borderColor = color;
    container.appendChild(ring);

    const anim = ring.animate([
      { transform:'translate(-50%,-50%) scale(0.2)', opacity:1 },
      { transform:'translate(-50%,-50%) scale(1.8)', opacity:0 }
    ], { duration:SHOCKWAVE_DURATION_MS, easing:'ease-out' });
    const cleanup = ()=> ring.remove();
    anim.onfinish = cleanup;
    anim.oncancel = cleanup;
  }

  // ---------- Milestone ripple (every 3rd link past 6 in a live chain) ----------
  // A visual reward for long connections: one big shockwave from the newest
  // star, plus every star on the board throbbing in sequence — delay scaled
  // by distance from the source, so it visibly radiates outward like a wave
  // rather than all stars flashing at once.
  const RIPPLE_SHOCKWAVE_SIZE = 160;
  const RIPPLE_THROB_DURATION_MS = 320;
  const RIPPLE_SPEED_PX_PER_SEC = 2400; // how fast the throb wave travels outward

  function triggerBoardRipple(sourceObj){
    const boardRect = boardWrap.getBoundingClientRect();
    const sourceRect = sourceObj.ballEl.getBoundingClientRect();
    const sx = sourceRect.left - boardRect.left + sourceRect.width/2;
    const sy = sourceRect.top - boardRect.top + sourceRect.height/2;

    spawnRippleShockwave(sx, sy);
    playEnergyExplosion();
    showComboPopup();

    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const obj = grid[r][c];
        if(!obj) continue;
        const br = obj.ballEl.getBoundingClientRect();
        const ox = br.left - boardRect.left + br.width/2;
        const oy = br.top - boardRect.top + br.height/2;
        const dist = Math.hypot(ox-sx, oy-sy);
        const delayMs = (dist/RIPPLE_SPEED_PX_PER_SEC)*1000;
        setTimeout(()=> rippleThrob(obj), delayMs);
      }
    }
  }

  function spawnRippleShockwave(x, y){
    const ring = document.createElement('div');
    ring.className = 'shockwave-ring';
    ring.style.left = x+'px';
    ring.style.top = y+'px';
    ring.style.width = RIPPLE_SHOCKWAVE_SIZE+'px';
    ring.style.height = RIPPLE_SHOCKWAVE_SIZE+'px';
    ring.style.borderColor = '#eaf1ff';
    boardWrap.appendChild(ring);

    const anim = ring.animate([
      { transform:'translate(-50%,-50%) scale(0.15)', opacity:1 },
      { transform:'translate(-50%,-50%) scale(2.4)', opacity:0 }
    ], { duration:620, easing:'ease-out' });
    const cleanup = ()=> ring.remove();
    anim.onfinish = cleanup;
    anim.oncancel = cleanup;
  }

  function rippleThrob(obj){
    const visual = obj.ballEl.querySelector('.star-visual');
    visual.animate([
      { transform:'scale(calc(var(--star-scale,1) * var(--bulk-scale,1)))' },
      { transform:'scale(calc(var(--star-scale,1) * var(--bulk-scale,1) * 1.35))' },
      { transform:'scale(calc(var(--star-scale,1) * var(--bulk-scale,1)))' }
    ], { duration:RIPPLE_THROB_DURATION_MS, easing:'ease-out' });
  }

  // ---------- March: equal-spaced beads flowing along the A->B polyline ----------
  // Point A = where the player's drag began (first ball in the chain).
  // Point B = where the player released (last ball, the merge target).
  // Every ball in between (and the first ball itself) becomes a "bead" that
  // travels the SAME continuous route, keeping constant spacing from its
  // neighbors, and is removed the instant it reaches B's center — not
  // independently hopping cell-to-cell on its own clock.
  const MARCH_SPEED_PX_PER_SEC = 638;   // how fast beads travel along the wire

  function marchChain(path, lastObj){
    return new Promise((resolve)=>{
      const boardRect = boardWrap.getBoundingClientRect();
      const cellCenter = (p)=>{
        const obj = grid[p.r][p.c];
        const br = obj.ballEl.getBoundingClientRect();
        return {
          x: br.left - boardRect.left + br.width/2,
          y: br.top - boardRect.top + br.height/2
        };
      };
      const routePoints = path.map(cellCenter); // A ... B, in order

      // precompute cumulative arc-length at each route point
      const segLen = [];
      let totalLen = 0;
      for(let i=0;i<routePoints.length-1;i++){
        const dx = routePoints[i+1].x - routePoints[i].x;
        const dy = routePoints[i+1].y - routePoints[i].y;
        const len = Math.hypot(dx,dy);
        segLen.push(len);
        totalLen += len;
      }
      const cumLen = [0];
      segLen.forEach(l=> cumLen.push(cumLen[cumLen.length-1]+l));

      // position along the route (0 = A, totalLen = B) for a given distance
      function pointAtDistance(d){
        if(d<=0) return routePoints[0];
        if(d>=totalLen) return routePoints[routePoints.length-1];
        let i=0;
        while(i<cumLen.length-1 && cumLen[i+1]<d) i++;
        const segStart = cumLen[i], segEnd = cumLen[i+1];
        const t = segEnd>segStart ? (d-segStart)/(segEnd-segStart) : 0;
        const p0 = routePoints[i], p1 = routePoints[i+1];
        return { x: p0.x + (p1.x-p0.x)*t, y: p0.y + (p1.y-p0.y)*t };
      }

      // Every ball in the path (including the first) is a bead, EXCEPT the
      // last one — that's Point B itself, the stationary merge target.
      const beadCount = path.length - 1;
      if(beadCount <= 0){ resolve(); return; }

      // Each bead's OWN cell is already a point on the route (that's where
      // it's sitting right now), at arc-distance cumLen[k] from A. So each
      // bead starts moving from exactly where it already is — no snapping,
      // no artificial queue behind A — and they all advance at the same
      // speed, which preserves their relative along-path spacing the whole
      // way to B, matching the connection line the player just drew.
      const beads = [];
      for(let k=0;k<beadCount;k++){
        const obj = grid[path[k].r][path[k].c];
        obj.ballEl.style.zIndex = 50;
        const startBulkScale = parseFloat(
          getComputedStyle(obj.ballEl).getPropertyValue('--bulk-scale')
        ) || 1;
        beads.push({ obj, startDist: cumLen[k], arrived:false, startBulkScale });
      }

      const boardRectStart = boardWrap.getBoundingClientRect();
      // each bead's element's own untransformed position (its real current
      // spot) so we can express motion as a translate() delta from there
      const origin = beads.map(b=>{
        const r = b.obj.ballEl.getBoundingClientRect();
        return {
          x: r.left - boardRectStart.left + r.width/2,
          y: r.top - boardRectStart.top + r.height/2
        };
      });

      // disable the normal CSS transition on bulk-scale while marching —
      // the rAF loop below drives it directly every frame, so a competing
      // CSS transition would just lag behind and look janky
      beads.forEach(bead=>{
        bead.obj.ballEl.querySelector('.star-visual').style.transition = 'none';
      });

      let startTime = null;
      let remaining = beadCount;

      // ---------- "Merge sound": ascending per-star twinkle bells ----------
      // Fires live as each star actually reaches Point B — NOT batched at
      // the end. Pitch is keyed to ARRIVAL ORDER (not each bead's original
      // position in the chain), because beads travel at a constant shared
      // speed from different starting distances, so a bead near the back of
      // the chain (closer to B already) can genuinely arrive before one
      // further away. Using arrival order guarantees the sequence the
      // player actually HEARS always starts low and climbs, regardless of
      // which physical star happens to land first.
      let arrivalCount = 0;
      const MERGE_SOUND_SEMITONE_STEP = 2; // whole-tone climb per arrival
      const mergeSoundBaseFreq = 440 * Math.pow(2, (lastObj.value-1)/12);
      function playMergeSoundTwinkle(){
        const freq = mergeSoundBaseFreq * Math.pow(2, (arrivalCount*MERGE_SOUND_SEMITONE_STEP)/12);
        playBell(freq, 0);
        arrivalCount++;
      }

      function frame(ts){
        if(startTime===null) startTime = ts;
        const elapsedSec = (ts-startTime)/1000;
        const traveled = elapsedSec * MARCH_SPEED_PX_PER_SEC;

        beads.forEach((bead, idx)=>{
          if(bead.arrived) return;
          const dist = bead.startDist + traveled;
          if(dist >= totalLen){
            bead.arrived = true;
            bead.obj.ballEl.style.setProperty('--bulk-scale', '1');

            playMergeSoundTwinkle();

            bead.obj.ballEl.animate([
              { transform: bead.obj.ballEl.style.transform, opacity:1 },
              { transform: bead.obj.ballEl.style.transform.replace(/scale\([^)]*\)/,'') + ' scale(0.25)', opacity:0 }
            ], { duration:90, easing:'ease-in', fill:'forwards' }).onfinish = ()=>{
              bead.obj.ballEl.remove();
            };
            remaining--;
            if(remaining<=0){ resolve(); }
            return;
          }
          const p = pointAtDistance(dist);
          const dx = p.x - origin[idx].x, dy = p.y - origin[idx].y;
          bead.obj.ballEl.style.transform = `translate(${dx}px, ${dy}px)`;

          // shrink from this bead's own starting bulk scale down to 1x,
          // proportional to how far it's traveled toward B (0 = just
          // started, 1 = arriving) — a true progressive shrink, not a
          // single reset before or after the march
          const remainingDist = totalLen - dist;
          const journeyLen = totalLen - bead.startDist;
          const progress = journeyLen>0 ? 1 - (remainingDist/journeyLen) : 1;
          const bulkNow = bead.startBulkScale + (1-bead.startBulkScale)*progress;
          bead.obj.ballEl.style.setProperty('--bulk-scale', bulkNow.toFixed(3));
        });

        if(remaining>0) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // safety-net fallback in case rAF stalls (tab backgrounding etc.)
      const worstCaseMs = (totalLen/MARCH_SPEED_PX_PER_SEC)*1000 + 800;
      setTimeout(()=>{
        if(remaining>0){
          beads.forEach(b=>{ if(!b.arrived) b.obj.ballEl.remove(); });
          resolve();
        }
      }, worstCaseMs);
    });
  }

  // "This is the constellation you made" — when a chain commits, the line
  // the player just drew gets a brief, dedicated fade-away moment: a CLONE
  // of the path (not the live pathLine, which needs to reset immediately
  // for the next drag) grows slightly then fades over 0.4s. Visual only —
  // no interaction with scoring/game state, purely a lingering flourish.
  const CONSTELLATION_FADE_DURATION_MS = 650;
  function spawnConstellationFadeLine(pathData){
    if(!pathData) return;
    const fadeLine = document.createElementNS('http://www.w3.org/2000/svg','path');
    fadeLine.setAttribute('d', pathData);
    fadeLine.setAttribute('fill', 'none');
    fadeLine.setAttribute('stroke', '#eaf1ff');
    fadeLine.setAttribute('stroke-width', '4.5');
    fadeLine.setAttribute('stroke-linecap', 'round');
    fadeLine.setAttribute('stroke-linejoin', 'round');
    fadeLine.style.filter = 'drop-shadow(0 0 5px rgba(143,184,255,0.75)) drop-shadow(0 0 10px rgba(143,184,255,0.35))';
    fadeLine.style.transformOrigin = 'center';
    fadeLine.style.transformBox = 'fill-box';
    pathSvg.appendChild(fadeLine);

    const anim = fadeLine.animate([
      { transform:'scale(1)',    opacity:0.95 },
      { transform:'scale(1.08)', opacity:0    }
    ], { duration:CONSTELLATION_FADE_DURATION_MS, easing:'ease-out' });
    const cleanup = ()=> fadeLine.remove();
    anim.onfinish = cleanup;
    anim.oncancel = cleanup;
  }

  function showMergePop(x,y,text,newValue){
    const pop = document.createElement('div');
    pop.className = 'merge-pop';
    pop.style.left = x + 'px';
    pop.style.top = y + 'px';
    pop.textContent = text === '✓' ? `→ ${newValue}` : `${text} → ${newValue}`;
    boardWrap.appendChild(pop);
    const anim = pop.animate([
      { transform:'translate(-50%,-50%) translateY(0)', opacity:1 },
      { transform:'translate(-50%,-50%) translateY(-30px)', opacity:0 }
    ], { duration:700, easing:'ease-out' });
    const cleanup = ()=> pop.remove();
    anim.onfinish = cleanup;
    anim.oncancel = cleanup;
  }

  // "Combo!" popup: big yellow text, centered on the board, grows outward
  // from a small starting scale then fades — fires alongside the board-wide
  // milestone ripple/shockwave.
  const COMBO_POPUP_DURATION_MS = 700;
  function showComboPopup(){
    const pop = document.createElement('div');
    pop.className = 'combo-pop';
    pop.textContent = 'Combo!';
    boardWrap.appendChild(pop);
    const anim = pop.animate([
      { transform:'translate(-50%,-50%) scale(0.4)', opacity:1 },
      { transform:'translate(-50%,-50%) scale(1.15)', opacity:1, offset:0.55 },
      { transform:'translate(-50%,-50%) scale(1.3)', opacity:0 }
    ], { duration:COMBO_POPUP_DURATION_MS, easing:'ease-out' });
    const cleanup = ()=> pop.remove();
    anim.onfinish = cleanup;
    anim.oncancel = cleanup;
  }

  // ---------- Collapse + refill (gravity drop) ----------
  function collapseAndRefill(){
    logEvent('Collapse start cue');
    const dropPromises = [];

    for(let c=0;c<COLS;c++){
      // gather remaining values top->bottom
      const remaining = [];
      for(let r=0;r<ROWS;r++){
        if(grid[r][c]) remaining.push(grid[r][c]);
      }
      const missing = ROWS - remaining.length;

      // new column: missing new balls on top (spawn above board), then remaining
      const newColumn = [];
      for(let i=0;i<missing;i++) newColumn.push(null); // placeholder, filled below
      for(let i=0;i<remaining.length;i++) newColumn.push(remaining[i]);

      // clear grid column
      for(let r=0;r<ROWS;r++) grid[r][c] = null;

      // place remaining objects into new row positions, animate fall
      for(let r=0;r<ROWS;r++){
        if(newColumn[r] && newColumn[r]!==null && typeof newColumn[r]==='object'){
          const obj = newColumn[r];
          const oldR = parseInt(obj.ballEl.dataset.r);
          grid[r][c] = obj;
          obj.ballEl.dataset.r = r;
          obj.cellEl.dataset.r = r;
          moveBallToCell(obj, r, c);
          if(oldR !== r){
            dropPromises.push(animateDropShift(obj, oldR, r));
          }
        }
      }

      // fill placeholders (top) with brand new balls
      for(let r=0;r<missing;r++){
        const value = randomValue();
        const obj = createCell(r,c,value,false);
        grid[r][c] = obj;
        // reposition DOM node into correct cell slot & animate drop-in
        moveBallToCell(obj, r, c);
        obj.ballEl.classList.add('newly-spawned');
        dropPromises.push(new Promise(res=>{
          const anim = obj.ballEl.animate([
            { transform:`translateY(${-100 - r*20}%)`, opacity:0 },
            { transform:'translateY(0)', opacity:1 }
          ], { duration:320, delay:r*40, easing:'cubic-bezier(.2,.8,.3,1.2)' });
          const done = ()=>{ obj.ballEl.classList.remove('newly-spawned'); res(); };
          anim.onfinish = done;
          anim.oncancel = done;
          setTimeout(done, r*40+500);
        }));
      }
    }

    Promise.all(dropPromises).then(()=>{
      logEvent('Collapse end cue');
      boardLocked = false;
      if(!hasAnyMove()){
        logEvent('No moves left - reshuffling');
        reshuffleBoard();
      }
    });
  }

  function moveBallToCell(obj, r, c){
    // relocate ball element into the correct cell div in the DOM grid (grid is CSS grid, order matters for layout)
    const targetCell = gridEl.children[r*COLS + c];
    if(targetCell && obj.ballEl.parentElement !== targetCell){
      targetCell.appendChild(obj.ballEl);
      obj.cellEl = targetCell;
    }
    obj.ballEl.dataset.r = r;
    obj.ballEl.dataset.c = c;
  }

  function animateDropShift(obj, oldR, newR){
    return new Promise((resolve)=>{
      const rowsMoved = newR - oldR;
      const cellHeight = obj.ballEl.getBoundingClientRect().height;
      const dy = -rowsMoved * (cellHeight + 6); // negative: start above, fall down
      const anim = obj.ballEl.animate([
        { transform:`translateY(${dy}px)` },
        { transform:'translateY(0)' }
      ], { duration:260, easing:'cubic-bezier(.3,.7,.4,1.2)' });
      const done = ()=> resolve();
      anim.onfinish = done;
      anim.oncancel = done;
      setTimeout(done, 500);
    });
  }

  // ---------- Move availability check ----------
  function hasAnyMove(){
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const obj = grid[r][c];
        if(!obj) continue;
        for(let dr=-1;dr<=1;dr++){
          for(let dc=-1;dc<=1;dc++){
            if(dr===0&&dc===0) continue;
            const nb = cellAt(r+dr,c+dc);
            if(nb && nb.value===obj.value) return true;
          }
        }
      }
    }
    return false;
  }

  function reshuffleBoard(){
    boardLocked = true;
    const values = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) values.push(grid[r][c].value);
    // simple shuffle
    for(let i=values.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [values[i],values[j]] = [values[j],values[i]];
    }
    let i=0;
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const obj = grid[r][c];
        obj.value = values[i++];
        obj.ballEl.querySelector('.star-label').textContent = obj.value;
        applyStarColor(obj, obj.value);
        applyStarScale(obj, obj.value);
        obj.ballEl.animate([{opacity:0.3},{opacity:1}], {duration:300});
      }
    }
    boardLocked = false;
    if(!hasAnyMove()) reshuffleBoard(); // extremely unlikely, but guard against infinite-loop edge case
  }

  // ---------- HUD ----------
  function updateHud(){
    document.getElementById('hud-score').textContent = highestNumber;
    document.getElementById('hud-best').textContent = bestChain;
    document.getElementById('hud-merges').textContent = mergeCount;
  }

  // ---------- Audio: Stack Tones pattern ----------
  let audioCtx = null;
  let audioMuted = false;
  function ensureAudio(){
    if(audioMuted) return null;
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; }
    }
    return audioCtx;
  }
  const BASE_FREQ_HZ = 554; // C#5 — four semitones up from A4, very bright
  const SEMITONES_PER_STEP = 2;
  let chainAnchorFreq = BASE_FREQ_HZ; // fixed for the duration of one chain selection, never randomized mid-chain

  // Fires live as each ball is added to the chain during selection (the
  // "action of connection" itself), not batched at merge time. First ball
  // in a chain sets the anchor note; every later ball climbs from it.
  function playConnectionTone(indexInChain, ballValue){
    const ctx = ensureAudio();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    if(indexInChain === 0){
      chainAnchorFreq = BASE_FREQ_HZ * Math.pow(2, (ballValue-1)/12);
    }
    const freq = chainAnchorFreq * Math.pow(2, (indexInChain*SEMITONES_PER_STEP)/12);
    playBell(freq, 0);
  }

  // Bell sound: additive synthesis with inharmonic partials (bells don't ring
  // at perfect harmonics — they're metallic and complex). A sharp strike
  // attack followed by a shimmering, gradually-decaying echo. Each partial
  // decays at a different rate, creating the evolving timbre.
  function playBell(freq, startAtSec){
    const ctx = ensureAudio();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const startAt = now + startAtSec;
    // A4 (440 Hz) as the baseline — all incoming freq values are musical
    // pitches derived from this, so no need for extreme pitch multipliers
    const baseFreq = freq;
    const TWINKLE_VOLUME = 0.08; // It is quiet.

    // Crystal bell with metallic reverb: harmonic core + delayed inharmonic
    // echo layers. Creates a "twinkly" ringing quality with subtle metal shimmer.
    const playPartial = (harmonic, peakGain, decayTime, delayMs = 0) => {
      const partialStartAt = startAt + (delayMs / 1000);
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = baseFreq * harmonic;

      gain.gain.setValueAtTime(0.0001, partialStartAt);
      gain.gain.linearRampToValueAtTime(peakGain * TWINKLE_VOLUME, partialStartAt + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, partialStartAt + 0.012 + decayTime);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(partialStartAt);
      osc.stop(partialStartAt + 0.012 + decayTime + 0.02);
    };

    // Main crystal core: harmonic series (1x, 2x, 3x, 4x, 5x)
    playPartial(1.0,  0.26, 1.0);    // fundamental
    playPartial(2.0,  0.14, 0.85);   // octave
    playPartial(3.0,  0.09, 0.75);   // twelfth
    playPartial(4.0,  0.06, 0.65);   // two octaves
    playPartial(5.0,  0.04, 0.6);    // major third

    // Metallic reverb layer: delayed, slightly inharmonic copies (non-harmonic
    // ratios 2.43, 3.56 etc.) at lower volume. This creates the "twinkle"
    // and "metal ring" without overwhelming the pure crystal core.
    playPartial(1.0,    0.08, 1.4, 60);   // delayed fundamental echo
    playPartial(2.43,   0.06, 1.2, 140);  // inharmonic shimmer
    playPartial(3.56,   0.05, 1.0, 220);  // higher inharmonic shimmer
    playPartial(1.71,   0.04, 0.9, 90);   // extra twinkle layer
    playPartial(4.87,   0.03, 0.8, 180);  // bright twinkle
  }

  // ---------- Energy explosion (board combo shockwave sound) ----------
  // Bright, peppy, high-pitched energy burst with a real delay/feedback echo
  // tail — used for the milestone/combo board-wide ripple. Built from noise
  // (for the crack/body/echo texture) + high triangle "energy" tones (for
  // the exciting, electric quality), NOT plain oscillator beeps — that's
  // what keeps it dramatic rather than arcadey. ~1.1s total, tuned and
  // approved via a standalone test page before being wired in here.
  function createNoiseBuffer(ctx, durationSec){
    const bufferSize = Math.ceil(ctx.sampleRate * durationSec);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      data[i] = Math.random()*2 - 1;
    }
    return buffer;
  }

  function playEnergyExplosion(){
    const ctx = ensureAudio();
    if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();

    const now = ctx.currentTime;

    // Shared echo bus: real delay + feedback loop. Everything routes through
    // this so the whole explosion echoes as one coherent event.
    const dryGain = ctx.createGain();
    dryGain.gain.value = 1.0;
    dryGain.connect(ctx.destination);

    const delay = ctx.createDelay(1.0);
    delay.delayTime.value = 0.14;
    const feedback = ctx.createGain();
    feedback.gain.value = 0.38;
    const echoFilter = ctx.createBiquadFilter();
    echoFilter.type = 'lowpass';
    echoFilter.frequency.value = 5000; // bright enough to carry the high energy tones through the repeats

    const echoSendGain = ctx.createGain();
    echoSendGain.gain.value = 0.55;

    echoSendGain.connect(delay);
    delay.connect(echoFilter);
    echoFilter.connect(feedback);
    feedback.connect(delay);
    echoFilter.connect(ctx.destination);

    function routeToMixAndEcho(node){
      node.connect(dryGain);
      node.connect(echoSendGain);
    }

    // PHASE 1: energy charge/release (0 - 0.12s) — resonant swell, not a laser zap
    const chargeDur = 0.12;
    const chargeNoise = ctx.createBufferSource();
    chargeNoise.buffer = createNoiseBuffer(ctx, chargeDur);
    const chargeFilter = ctx.createBiquadFilter();
    chargeFilter.type = 'bandpass';
    chargeFilter.Q.value = 2.2;
    chargeFilter.frequency.setValueAtTime(500, now);
    chargeFilter.frequency.exponentialRampToValueAtTime(2600, now + chargeDur);
    const chargeGain = ctx.createGain();
    chargeGain.gain.setValueAtTime(0.0001, now);
    chargeGain.gain.exponentialRampToValueAtTime(0.35, now + chargeDur*0.85);
    chargeGain.gain.linearRampToValueAtTime(0.0001, now + chargeDur);
    chargeNoise.connect(chargeFilter);
    chargeFilter.connect(chargeGain);
    routeToMixAndEcho(chargeGain);
    chargeNoise.start(now);
    chargeNoise.stop(now + chargeDur + 0.02);

    // PHASE 2: explosion impact (starts ~0.12s, ~0.5s body)
    const boomAt = now + chargeDur;
    const boomBodyDur = 0.5;

    // resonant energy body — bright/high register, tonal power not thin noise
    const bodyNoise = ctx.createBufferSource();
    bodyNoise.buffer = createNoiseBuffer(ctx, boomBodyDur);
    const bodyFilter = ctx.createBiquadFilter();
    bodyFilter.type = 'bandpass';
    bodyFilter.Q.value = 3.5;
    bodyFilter.frequency.setValueAtTime(1900, boomAt);
    bodyFilter.frequency.exponentialRampToValueAtTime(700, boomAt + boomBodyDur);
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(0.0001, boomAt);
    bodyGain.gain.linearRampToValueAtTime(0.5, boomAt + 0.02);
    bodyGain.gain.exponentialRampToValueAtTime(0.0001, boomAt + boomBodyDur);
    bodyNoise.connect(bodyFilter);
    bodyFilter.connect(bodyGain);
    routeToMixAndEcho(bodyGain);
    bodyNoise.start(boomAt);
    bodyNoise.stop(boomAt + boomBodyDur + 0.02);

    // sharp broadband crack transient
    const crackNoise = ctx.createBufferSource();
    crackNoise.buffer = createNoiseBuffer(ctx, 0.1);
    const crackFilter = ctx.createBiquadFilter();
    crackFilter.type = 'lowpass';
    crackFilter.frequency.setValueAtTime(5000, boomAt);
    crackFilter.frequency.exponentialRampToValueAtTime(600, boomAt + 0.1);
    const crackGain = ctx.createGain();
    crackGain.gain.setValueAtTime(0.0001, boomAt);
    crackGain.gain.linearRampToValueAtTime(0.55, boomAt + 0.006);
    crackGain.gain.exponentialRampToValueAtTime(0.0001, boomAt + 0.1);
    crackNoise.connect(crackFilter);
    crackFilter.connect(crackGain);
    routeToMixAndEcho(crackGain);
    crackNoise.start(boomAt);
    crackNoise.stop(boomAt + 0.12);

    // brief punch thud — light, just a snap of impact underneath
    const thudOsc = ctx.createOscillator();
    const thudGain = ctx.createGain();
    thudOsc.type = 'sine';
    thudOsc.frequency.setValueAtTime(160, boomAt);
    thudOsc.frequency.exponentialRampToValueAtTime(55, boomAt + 0.18);
    thudGain.gain.setValueAtTime(0.0001, boomAt);
    thudGain.gain.linearRampToValueAtTime(0.4, boomAt + 0.01);
    thudGain.gain.exponentialRampToValueAtTime(0.0001, boomAt + 0.22);
    thudOsc.connect(thudGain);
    routeToMixAndEcho(thudGain);
    thudOsc.start(boomAt);
    thudOsc.stop(boomAt + 0.24);

    // main energy tone — bright, peppy, electric
    const energyTone = ctx.createOscillator();
    const energyGain = ctx.createGain();
    const energyFilter = ctx.createBiquadFilter();
    energyTone.type = 'triangle';
    energyTone.frequency.setValueAtTime(2600, boomAt);
    energyTone.frequency.exponentialRampToValueAtTime(1400, boomAt + 0.4);
    energyFilter.type = 'lowpass';
    energyFilter.frequency.value = 5500;
    energyGain.gain.setValueAtTime(0.0001, boomAt);
    energyGain.gain.linearRampToValueAtTime(0.18, boomAt + 0.03);
    energyGain.gain.exponentialRampToValueAtTime(0.0001, boomAt + 0.4);
    energyTone.connect(energyFilter);
    energyFilter.connect(energyGain);
    routeToMixAndEcho(energyGain);
    energyTone.start(boomAt);
    energyTone.stop(boomAt + 0.42);

    // second, higher shimmer layer riding on top
    const energyTone2 = ctx.createOscillator();
    const energyGain2 = ctx.createGain();
    energyTone2.type = 'triangle';
    energyTone2.frequency.setValueAtTime(4800, boomAt);
    energyTone2.frequency.exponentialRampToValueAtTime(2600, boomAt + 0.3);
    energyGain2.gain.setValueAtTime(0.0001, boomAt);
    energyGain2.gain.linearRampToValueAtTime(0.1, boomAt + 0.02);
    energyGain2.gain.exponentialRampToValueAtTime(0.0001, boomAt + 0.3);
    energyTone2.connect(energyGain2);
    routeToMixAndEcho(energyGain2);
    energyTone2.start(boomAt);
    energyTone2.stop(boomAt + 0.32);

    // Dry content ends ~boomAt + 0.5 (~0.62s from start). The rest of the
    // ~1.1s total is carried by the echo tail from the delay/feedback loop.
  }

  // ---------- Height-First Auto-Scaling ----------
  const BOARD_PAD_H_PX = 20; // board-wrap horizontal padding total
  const BOARD_WIDTH_FLOOR_PX = 260;
  const BOARD_WIDTH_CEILING_PX = 460;

  let rafId = null;
  function updateBoardScale(){
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(()=>{
      rafId = null;
      const appEl = document.getElementById('app');
      const titleEl = document.getElementById('game-title');
      const infoEl = document.getElementById('info-row');
      const hudEl = document.getElementById('hud');
      const actionEl = document.getElementById('action-row');

      const appStyle = getComputedStyle(appEl);
      const appPadV = parseFloat(appStyle.paddingTop) + parseFloat(appStyle.paddingBottom);
      const appGap = parseFloat(appStyle.rowGap || appStyle.gap) || 0;
      const totalGaps = appGap * 3;

      const chromeHeight = titleEl.offsetHeight + infoEl.offsetHeight
        + hudEl.offsetHeight + actionEl.offsetHeight + appPadV + totalGaps;

      const trueAvailableHeight = window.innerHeight - chromeHeight;

      // board is square-ish: width == available height budget (minus its own padding), capped
      let targetW = trueAvailableHeight - BOARD_PAD_H_PX;

      const widthCapFromViewport = window.innerWidth * 0.92;
      targetW = Math.min(targetW, widthCapFromViewport, BOARD_WIDTH_CEILING_PX);
      targetW = Math.max(targetW, BOARD_WIDTH_FLOOR_PX);

      appEl.style.setProperty('--board-max-w', targetW + 'px');
    });
  }
  window.addEventListener('resize', updateBoardScale);

  // ---------- Debug panel ----------
  document.getElementById('btn-debug-toggle').addEventListener('click', ()=>{
    document.getElementById('debug-panel').classList.toggle('show');
  });
  document.getElementById('btn-debug-restart').addEventListener('click', ()=>{
    logEvent('Debug: restart');
    bestChain=0; mergeCount=0;
    initGrid();
    updateHud();
    updateBoardScale();
  });
  document.getElementById('btn-logs').addEventListener('click', ()=>{
    const text = debugLog.join('\n');
    navigator.clipboard.writeText(text).catch(()=>{});
  });
  document.getElementById('btn-preview-rescale').addEventListener('click', (e)=>{
    const on = document.body.classList.toggle('preview-shrink');
    e.target.textContent = `Preview Rescale: ${on ? 'On' : 'Off'}`;
    updateBoardScale();
  });

  // ---------- Tutorial overlay ----------
  document.getElementById('btn-info').addEventListener('click', ()=>{
    document.getElementById('overlay-tutorial').classList.add('show');
  });
  document.getElementById('btn-close-tutorial').addEventListener('click', ()=>{
    document.getElementById('overlay-tutorial').classList.remove('show');
  });

  // ---------- Mute button ----------
  document.getElementById('btn-mute').addEventListener('click', ()=>{
    audioMuted = !audioMuted;
    const btn = document.getElementById('btn-mute');
    btn.textContent = audioMuted ? '🔇' : '🔊';
  });

  // ---------- Restart button ----------
  document.getElementById('btn-restart').addEventListener('click', ()=>{
    logEvent('Restart button pressed');
    bestChain=0; mergeCount=0;
    initGrid();
    updateHud();
    updateBoardScale();
  });

  // prevent page scroll/bounce while dragging on the board
  boardWrap.addEventListener('touchmove', (e)=>{ e.preventDefault(); }, { passive:false });

  // ---------- Background starfield (ambient, screen-space) ----------
  const starCanvas = document.getElementById('starfield');
  const starCtx = starCanvas.getContext('2d');
  let bgStars = [];

  function seedStarfield(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    starCanvas.width = window.innerWidth * dpr;
    starCanvas.height = window.innerHeight * dpr;
    starCanvas.style.width = window.innerWidth + 'px';
    starCanvas.style.height = window.innerHeight + 'px';
    starCtx.setTransform(dpr,0,0,dpr,0,0);

    const density = Math.floor((window.innerWidth * window.innerHeight) / 9000);
    bgStars = [];
    for(let i=0;i<density;i++){
      bgStars.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        r: Math.random()*1.3 + 0.4,
        baseAlpha: Math.random()*0.5 + 0.25,
        phase: Math.random()*Math.PI*2,
        speed: Math.random()*0.6 + 0.25 // radians/sec, twinkle cycle rate
      });
    }
  }

  let bgLastTs = null;
  function drawStarfield(ts){
    if(bgLastTs===null) bgLastTs = ts;
    const dt = (ts - bgLastTs)/1000;
    bgLastTs = ts;

    starCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
    bgStars.forEach(s=>{
      s.phase += s.speed*dt;
      const twinkle = (Math.sin(s.phase)+1)/2; // 0..1
      const alpha = s.baseAlpha * (0.5 + 0.5*twinkle);
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      starCtx.fillStyle = `rgba(228,236,255,${alpha.toFixed(3)})`;
      starCtx.fill();
    });
    requestAnimationFrame(drawStarfield);
  }

  window.addEventListener('resize', seedStarfield);

  // ---------- Init ----------
  initGrid();
  updateHud();
  updateBoardScale();
  seedStarfield();
  requestAnimationFrame(drawStarfield);
  logEvent('Game loaded');

})();
</script>
</body>
